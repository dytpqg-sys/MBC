name: Supabase Backup to GitHub

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Fetch from Supabase
        run: |
          curl -s \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/worklog_news?id=eq.main&select=data" \
            | python3 -c "
          import sys,json
          r=json.load(sys.stdin)
          d=r[0]['data'] if r and r[0].get('data') else {}
          print(json.dumps(d,ensure_ascii=False,indent=2))
          " > logs/worklog_news.json

      - name: Commit backup
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add logs/worklog_news.json
          if git diff --staged --quiet; then
            echo "변경 없음"
          else
            git commit -m "$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST') 자동 백업"
            git push
          fi

  keep-alive:
    runs-on: ubuntu-latest
    needs: backup
    steps:
      - name: Ping Supabase
        run: |
          S=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/worklog_news?id=eq.main&select=id")
          echo "Status: $S"
          [ "$S" = "200" ] && echo "활성 유지" || exit 1
