<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>방송기술부 일정관리</title>
<style>
:root{
  --bg:#ebe8e2;
  --blue:#1a56db;--blue-lt:#eff3ff;--blue-dk:#1e40af;
  --gray:#f4f2ee;--paper:#faf9f6;
  --red:#dc2626;--green:#16a34a;--amber:#d97706;--purple:#7c3aed;
  --sc:#0ea5e9;--pc:#7c3aed;
  --ink:#1a1a1a;--dim:#555;--muted:#999;
  --shadow:0 4px 28px rgba(0,0,0,.11);--shadow-sm:0 2px 10px rgba(0,0,0,.07);
  --shadow-pop:0 8px 40px rgba(0,0,0,.18);
  --font:'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo',sans-serif;
  --cell-h:148px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--font);min-height:100vh;line-height:1.4;overflow-x:hidden}
button,input,select,textarea{font:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

/* ── 공통 버튼 ── */
.btn{display:inline-flex;align-items:center;gap:4px;border:none;border-radius:8px;background:var(--blue);color:#fff;padding:7px 13px;cursor:pointer;font-weight:700;font-size:12px;transition:all .13s;white-space:nowrap}
.btn:hover{background:var(--blue-dk)}
.btn:active{transform:translateY(1px)}
.btn-ghost{background:transparent;color:var(--blue);border:1.5px solid rgba(26,86,219,.35);padding:5px 11px}
.btn-ghost:hover{background:var(--blue-lt)}
.btn-sec{background:var(--gray);color:var(--dim);border:1px solid #ddd}
.btn-sec:hover{background:#e2ded7;color:var(--ink)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:7px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px}

/* ── 레이아웃 ── */
.wrap{max-width:1640px;margin:0 auto;padding:14px}
.sheet{background:var(--paper);border-radius:18px;overflow:hidden;box-shadow:var(--shadow)}

/* ── 헤더 (1줄) ── */
header{
  padding:10px 18px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  border-bottom:2px solid var(--blue-lt);background:var(--paper);
  position:relative;
}
header::after{content:'';position:absolute;bottom:-2px;left:0;width:60px;height:2px;background:var(--blue)}

.h-left{display:flex;align-items:center;gap:14px}
.app-title{font-size:17px;font-weight:800;color:var(--ink);letter-spacing:-.03em;white-space:nowrap}
.dept-dot{width:7px;height:7px;border-radius:50%;background:var(--blue);flex-shrink:0}

/* 월 네비 (중앙) */
.h-mid{display:flex;align-items:center;gap:7px}
.month-lbl{font-size:15px;font-weight:800;color:var(--blue);background:var(--blue-lt);border:1px solid rgba(26,86,219,.18);border-radius:999px;padding:4px 16px;min-width:120px;text-align:center;cursor:default}
.month-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid #ddd;background:var(--gray);color:var(--blue);font-size:16px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.month-btn:hover{border-color:var(--blue);background:var(--blue-lt);transform:translateY(-1px)}

/* 탭 + 우측 버튼 */
.h-right{display:flex;align-items:center;gap:8px}
.mode-tabs{display:flex;background:var(--gray);border:1.5px solid #ddd;border-radius:10px;padding:3px;gap:3px}
.mode-tab{padding:5px 16px;border-radius:7px;border:none;background:transparent;color:var(--muted);font-weight:700;font-size:12px;cursor:pointer;transition:all .14s}
.mode-tab.on-shift{background:var(--sc);color:#fff;box-shadow:0 2px 8px rgba(14,165,233,.3)}
.mode-tab.on-prod{background:var(--pc);color:#fff;box-shadow:0 2px 8px rgba(124,58,237,.3)}
.mode-tab:not(.on-shift):not(.on-prod):hover{color:var(--ink);background:#e2ded7}

.sb-dot-wrap{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);padding:4px 8px;border-radius:7px;background:var(--gray);border:1px solid #ddd}
.sb-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
.sb-dot.ok{background:var(--green)}.sb-dot.err{background:var(--red)}.sb-dot.spin{background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ── 캘린더 그리드 ── */
.cal-shell{padding:10px 14px 14px}
.cal-grid{
  display:grid;
  grid-template-columns:repeat(7,minmax(0,1fr));
  grid-template-rows:28px repeat(6,var(--cell-h));
  border:1.5px solid #ddd;border-radius:12px;overflow:hidden;
  background:#ddd;gap:1px;
}

/* 요일 헤더 */
.wdhd{display:flex;align-items:center;justify-content:center;background:var(--gray);font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.06em}
.wdhd.sun{color:var(--red)}.wdhd.sat{color:var(--blue)}

/* 날짜 셀 */
.day-cell{
  background:var(--paper);padding:5px 5px 4px;
  display:flex;flex-direction:column;gap:2px;
  position:relative;cursor:pointer;
  transition:background .1s;
  overflow:hidden;
}
.day-cell:hover{background:#f3f1ed}
.day-cell.other{background:var(--gray)!important;cursor:default;pointer-events:none}
.day-cell.other *{visibility:hidden}
.day-cell.sun-c{background:#fff9f9}
.day-cell.sat-c{background:#f8f9ff}
.day-cell.today-c{background:var(--blue-lt);outline:2px solid rgba(26,86,219,.3);outline-offset:-2px}
.day-cell.holiday-c{background:#fff5f5}
.day-cell.drop-over{background:var(--blue-lt)!important;outline:2px dashed var(--blue);outline-offset:-2px}

/* 날짜 숫자 행 */
.date-row{display:flex;align-items:center;justify-content:space-between;min-height:20px;margin-bottom:1px}
.date-num{font-size:12px;font-weight:700;color:var(--dim);line-height:1}
.day-cell.sun-c .date-num,.day-cell.holiday-c .date-num{color:var(--red)}
.day-cell.sat-c .date-num{color:var(--blue)}
.day-cell.today-c .date-num{
  background:var(--blue);color:#fff;
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;
}
.date-badges{display:flex;gap:3px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.bdg-hol{font-size:9px;color:var(--red);background:rgba(220,38,38,.09);padding:1px 4px;border-radius:4px;font-weight:700;white-space:nowrap}

/* 이벤트 칩 */
.ev-list{display:flex;flex-direction:column;gap:2px;flex:1;overflow:hidden;min-height:0}
.chip{
  display:flex;align-items:center;gap:0;
  height:20px;border-radius:4px;overflow:hidden;
  font-size:10.5px;font-weight:700;cursor:pointer;
  transition:opacity .1s,filter .1s;
  position:relative;
}
.chip:hover{filter:brightness(.94)}
.chip.shift-c{background:rgba(14,165,233,.13)}
.chip.prod-c{background:rgba(124,58,237,.12)}
.chip-bar{width:3px;flex-shrink:0;align-self:stretch}
.chip.shift-c .chip-bar{background:var(--sc)}
.chip.prod-c .chip-bar{background:var(--pc)}
.chip-time{font-size:9.5px;color:#fff;padding:0 5px;height:100%;display:flex;align-items:center;flex-shrink:0;font-weight:800;min-width:36px;justify-content:center}
.chip.shift-c .chip-time{background:var(--sc)}
.chip.prod-c .chip-time{background:var(--pc)}
.chip-label{padding:0 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--dim);flex:1}

.more-btn{
  font-size:10px;color:var(--blue);padding:1px 5px;
  border:1px dashed rgba(26,86,219,.3);border-radius:4px;
  cursor:pointer;background:var(--blue-lt);width:fit-content;
  font-weight:700;margin-top:1px;
  transition:background .1s;
}
.more-btn:hover{background:#dce8ff}

/* ── 팝업 (풍선) ── */
.balloon{
  position:fixed;z-index:800;
  background:var(--paper);
  border:1.5px solid #ddd;
  border-radius:16px;
  box-shadow:var(--shadow-pop);
  width:300px;
  display:none;
  overflow:hidden;
}
.balloon.open{display:block}
.balloon-arrow{
  position:absolute;width:12px;height:12px;background:var(--paper);
  border:1.5px solid #ddd;transform:rotate(45deg);z-index:-1;
}

/* 팝업 — 이벤트 목록 뷰 */
.bl-head{
  padding:12px 14px 10px;
  border-bottom:1px solid #eee;
  display:flex;align-items:center;justify-content:space-between;
}
.bl-date{font-size:13px;font-weight:800;color:var(--ink)}
.bl-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;padding:0}
.bl-close:hover{color:var(--ink)}
.bl-body{padding:10px 12px;max-height:300px;overflow-y:auto}
.bl-ev-row{
  display:flex;align-items:center;gap:7px;
  padding:7px 9px;border-radius:9px;
  background:var(--gray);margin-bottom:5px;cursor:pointer;
  transition:background .1s;
}
.bl-ev-row:last-child{margin-bottom:0}
.bl-ev-row:hover{background:#e8e4dd}
.bl-ev-bar{width:3px;border-radius:2px;align-self:stretch;min-height:20px;flex-shrink:0}
.bl-ev-info{flex:1;min-width:0}
.bl-ev-name{font-size:12px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bl-ev-meta{font-size:10px;color:var(--muted);margin-top:1px}
.bl-ev-time{font-size:11px;font-weight:700;color:var(--blue);flex-shrink:0}
.bl-add{
  margin:8px 12px 10px;
  width:calc(100% - 24px);
  padding:8px;border-radius:9px;
  border:1.5px dashed rgba(26,86,219,.3);
  background:var(--blue-lt);color:var(--blue);
  font-weight:700;font-size:12px;cursor:pointer;
  transition:background .12s;
}
.bl-add:hover{background:#dce8ff}
.bl-empty{text-align:center;color:var(--muted);font-size:12px;padding:16px 0}

/* 팝업 — 입력 뷰 */
.bl-form{padding:12px 14px 14px}
.bl-form-head{display:flex;align-items:center;gap:7px;margin-bottom:12px}
.bl-back{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;padding:0}
.bl-back:hover{color:var(--ink)}
.bl-form-title{font-size:13px;font-weight:800;color:var(--ink)}
.f-row{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.f-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.07em;text-transform:uppercase}
.f-inp,.f-sel,.f-ta{
  width:100%;border:1.5px solid #ddd;border-radius:8px;
  padding:8px 10px;background:var(--gray);color:var(--ink);
  outline:none;font-size:12px;transition:border-color .12s;
}
.f-inp:focus,.f-sel:focus,.f-ta:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(26,86,219,.1)}
.f-ta{resize:vertical;min-height:56px}
.f-2col{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.f-actions{display:flex;justify-content:space-between;align-items:center;margin-top:12px;gap:6px}

/* 팝업 — 편집 뷰 */
.bl-edit-badge{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:700;color:#fff;margin-left:6px}
.bl-edit-badge.shift{background:var(--sc)}
.bl-edit-badge.prod{background:var(--pc)}

/* 목록 팝업(more) */
.more-popup{
  position:fixed;z-index:900;
  background:var(--paper);border:1.5px solid #ddd;
  border-radius:14px;box-shadow:var(--shadow-pop);
  width:260px;padding:10px 0;display:none;
}
.more-popup.open{display:block}
.more-popup-head{padding:6px 14px 8px;border-bottom:1px solid #eee;font-size:12px;font-weight:800;color:var(--ink)}
.more-popup-list{max-height:280px;overflow-y:auto;padding:6px 10px}
.more-popup-row{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:8px;cursor:pointer;transition:background .1s}
.more-popup-row:hover{background:var(--gray)}
.mp-bar{width:3px;border-radius:2px;align-self:stretch;min-height:18px;flex-shrink:0}
.mp-label{font-size:12px;font-weight:700;color:var(--ink);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mp-time{font-size:10px;font-weight:700;color:var(--blue);flex-shrink:0}

/* 설정 다이얼로그 */
dialog{border:0;border-radius:18px;box-shadow:var(--shadow-pop),0 0 0 1.5px #ddd;padding:0;color:var(--ink);background:var(--paper)}
dialog::backdrop{background:rgba(0,0,0,.4);backdrop-filter:blur(4px)}
.dlg-wrap{display:grid;grid-template-rows:auto 1fr auto;max-height:88vh;width:min(94vw,560px)}
.dlg-head{padding:15px 18px 11px;border-bottom:1.5px solid #eee;display:flex;justify-content:space-between;align-items:center}
.dlg-title{font-size:15px;font-weight:800}
.dlg-body{padding:16px 18px;overflow-y:auto}
.dlg-foot{padding:10px 18px 14px;border-top:1.5px solid #eee;display:flex;justify-content:flex-end;gap:8px}
.set-sec{background:var(--gray);border-radius:11px;padding:13px 14px;margin-bottom:10px}
.set-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:9px}
.wlist{display:flex;flex-wrap:wrap;gap:5px}
.w-chip{display:inline-flex;align-items:center;gap:5px;background:rgba(14,165,233,.1);border:1px solid rgba(14,165,233,.25);border-radius:999px;padding:4px 9px}
.w-inp{width:80px;background:transparent;border:none;border-bottom:1.5px solid transparent;color:var(--ink);font-size:12px;font-weight:700;outline:none;transition:border-color .12s}
.w-inp:focus{border-bottom-color:var(--blue)}
.w-del{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:11px;padding:0}
.w-del:hover{color:var(--red)}
.add-row{display:flex;gap:6px;margin-top:7px}
.add-inp{flex:1;background:var(--paper);border:1.5px solid #ddd;border-radius:8px;padding:6px 9px;color:var(--ink);font-size:12px;outline:none}
.add-inp:focus{border-color:var(--blue)}
.prog-list{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px}
.prog-tag{display:inline-flex;align-items:center;gap:4px;background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.25);color:var(--purple);border-radius:999px;padding:4px 10px;font-size:12px;font-weight:700}
.prog-del{background:transparent;border:none;color:inherit;cursor:pointer;font-size:11px;opacity:.6}
.prog-del:hover{opacity:1;color:var(--red)}
.pin-rows{display:flex;flex-direction:column;gap:7px}
.pin-rows .f-inp{letter-spacing:.12em}

/* 드래그 */
.chip.dragging{opacity:.4;transform:scale(.95)}

/* 인쇄 */
@media print{
  @page{size:A4 landscape;margin:5mm}
  .balloon,.more-popup,dialog,.print-hide{display:none!important}
  body{background:#fff}
  .wrap{padding:0;max-width:none}
  .sheet{border-radius:0;box-shadow:none}
  header{border-bottom:1px solid #ccc;padding:4px 0}
  .app-title{font-size:14pt}
  .cal-shell{padding:2mm 0 0}
  :root{--cell-h:0;--paper:#fff;--gray:#f5f5f5}
  .cal-grid{border:1px solid #bbb;border-radius:0;gap:0;grid-template-rows:22px repeat(6,1fr)}
  .day-cell{border-right:1px solid #bbb;border-bottom:1px solid #bbb;padding:2px 2px;min-height:26mm}
  .chip{height:16px;font-size:7pt}
  .chip-time{font-size:6.5pt;min-width:24px}
  .chip-label{font-size:7pt}
  .more-btn{font-size:6.5pt}
}
</style>
</head>
<body>

<!-- ── 메인 ── -->
<div class="wrap">
<div class="sheet">

<!-- 헤더 1줄 -->
<header>
  <div class="h-left">
    <div class="dept-dot"></div>
    <span class="app-title">방송기술부 일정관리</span>
  </div>
  <div class="h-mid">
    <button class="month-btn" id="btnPrev">‹</button>
    <span class="month-lbl" id="monthLbl"></span>
    <button class="month-btn" id="btnNext">›</button>
    <button class="btn btn-ghost btn-sm" id="btnToday">오늘</button>
  </div>
  <div class="h-right print-hide">
    <div class="mode-tabs">
      <button class="mode-tab on-shift" id="tabShift">근무</button>
      <button class="mode-tab" id="tabProd">제작</button>
    </div>
    <div class="sb-dot-wrap">
      <span class="sb-dot spin" id="sbDot"></span>
      <span id="sbTxt">연결 중</span>
    </div>
    <button class="btn btn-sec btn-sm" id="btnSettings">⚙</button>
    <button class="btn btn-ghost btn-sm" id="btnPrint">🖨</button>
  </div>
</header>

<!-- 캘린더 -->
<div class="cal-shell">
  <div class="cal-grid" id="calGrid"></div>
</div>
</div>
</div>

<!-- ── 풍선 팝업 ── -->
<div class="balloon" id="balloon">
  <!-- 목록 뷰 -->
  <div id="blList">
    <div class="bl-head">
      <span class="bl-date" id="blDate"></span>
      <button class="bl-close" id="blClose">✕</button>
    </div>
    <div class="bl-body" id="blBody"></div>
    <button class="bl-add" id="blAddBtn">+ 일정 추가</button>
  </div>
  <!-- 입력/편집 뷰 -->
  <div id="blForm" style="display:none">
    <div class="bl-form">
      <div class="bl-form-head">
        <button class="bl-back" id="blBack">‹</button>
        <span class="bl-form-title" id="blFormTitle">일정 추가</span>
        <span class="bl-edit-badge shift" id="blBadge" style="display:none"></span>
      </div>
      <!-- 근무 폼 -->
      <div id="formShift">
        <div class="f-row">
          <div class="f-label">근무자</div>
          <select class="f-sel" id="fWorker"></select>
        </div>
        <div class="f-row">
          <div class="f-label">구분</div>
          <select class="f-sel" id="fCategory">
            <option>휴가</option><option>오전반차</option><option>오후반차</option>
            <option>출장</option><option>교육</option><option>기타</option>
          </select>
        </div>
        <div class="f-2col">
          <div class="f-row" style="margin-bottom:0">
            <div class="f-label">시작일</div>
            <input class="f-inp" type="date" id="fDateS">
          </div>
          <div class="f-row" style="margin-bottom:0">
            <div class="f-label">종료일</div>
            <input class="f-inp" type="date" id="fDateE">
          </div>
        </div>
        <div class="f-row" style="margin-top:10px">
          <div class="f-label">메모</div>
          <textarea class="f-ta" id="fShiftMemo" placeholder="선택 사항"></textarea>
        </div>
      </div>
      <!-- 제작 폼 -->
      <div id="formProd" style="display:none">
        <div class="f-row">
          <div class="f-label">프로그램</div>
          <select class="f-sel" id="fProgram">
            <option>약손</option><option>시시각각</option><option>시사ON</option>
            <option>시민의품격</option><option value="__other__">직접 입력</option>
          </select>
          <input class="f-inp" id="fProgramOther" style="display:none;margin-top:6px" type="text" placeholder="프로그램명 입력">
        </div>
        <div class="f-row">
          <div class="f-label">내용</div>
          <input class="f-inp" type="text" id="fTitle" placeholder="촬영, 편집, 녹음 등">
        </div>
        <div class="f-2col">
          <div class="f-row" style="margin-bottom:0">
            <div class="f-label">날짜</div>
            <input class="f-inp" type="date" id="fProdDate">
          </div>
          <div class="f-row" style="margin-bottom:0">
            <div class="f-label">시간</div>
            <input class="f-inp" type="time" id="fTime" value="09:00">
          </div>
        </div>
        <div class="f-row" style="margin-top:10px">
          <div class="f-label">메모</div>
          <textarea class="f-ta" id="fProdMemo" placeholder="선택 사항"></textarea>
        </div>
      </div>
      <div class="f-actions">
        <button class="btn btn-danger btn-xs" id="fDel" style="display:none">삭제</button>
        <div style="display:flex;gap:6px;margin-left:auto">
          <button class="btn btn-sec btn-xs" id="fCancel">취소</button>
          <button class="btn btn-xs" id="fSave">저장</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- more 팝업 -->
<div class="more-popup" id="morePopup">
  <div class="more-popup-head" id="morePopupDate"></div>
  <div class="more-popup-list" id="morePopupList"></div>
</div>

<!-- 설정 다이얼로그 -->
<dialog id="dlgSettings">
  <div class="dlg-wrap">
    <div class="dlg-head">
      <span class="dlg-title">설정</span>
      <button class="btn btn-sec btn-sm" data-close="dlgSettings">닫기</button>
    </div>
    <div class="dlg-body">
      <div class="set-sec">
        <div class="set-title">구성원 <span id="wCnt" style="opacity:.4;font-size:9px"></span></div>
        <div class="wlist" id="wList"></div>
        <div class="add-row">
          <input class="add-inp" id="wInp" type="text" placeholder="이름 입력 후 Enter">
          <button class="btn btn-sm" id="wAddBtn">추가</button>
        </div>
      </div>
      <div class="set-sec">
        <div class="set-title">제작 프로그램 (고정)</div>
        <div class="prog-list" id="progList"></div>
        <div class="add-row">
          <input class="add-inp" id="pInp" type="text" placeholder="프로그램명 입력 후 Enter">
          <button class="btn btn-sm" id="pAddBtn">추가</button>
        </div>
      </div>
      <div class="set-sec">
        <div class="set-title">관리자 PIN 변경</div>
        <div class="pin-rows">
          <input class="f-inp" id="pinCur" type="password" maxlength="4" placeholder="현재 PIN" inputmode="numeric">
          <input class="f-inp" id="pinNew1" type="password" maxlength="4" placeholder="새 PIN" inputmode="numeric">
          <input class="f-inp" id="pinNew2" type="password" maxlength="4" placeholder="새 PIN 확인" inputmode="numeric">
          <button class="btn btn-sm" id="pinChangeBtn">PIN 변경</button>
        </div>
      </div>
    </div>
    <div class="dlg-foot">
      <button class="btn btn-sec btn-sm" data-close="dlgSettings">취소</button>
      <button class="btn btn-sm" id="settingSave">저장</button>
    </div>
  </div>
</dialog>

<script>
/* ════════════════════════════════════════════
   UI 바인딩
════════════════════════════════════════════ */
function bindUI() {
  gid('btnPrev').onclick  = () => { st.cur = addMonths(st.cur,-1); render(); };
  gid('btnNext').onclick  = () => { st.cur = addMonths(st.cur,1);  render(); };
  gid('btnToday').onclick = () => { st.cur = startOfMonth(new Date()); render(); };
  gid('btnPrint').onclick = () => window.print();
  gid('tabShift').onclick = () => setMode('shift');
  gid('tabProd').onclick  = () => setMode('prod');
  gid('btnSettings').onclick = openSettings;

  // 풍선 팝업
  gid('blClose').onclick = closeBalloon;
  gid('blBack').onclick  = () => showBalloonView('list');
  gid('blAddBtn').onclick= () => openForm(st.balloon.iso, null);
  gid('fCancel').onclick = () => showBalloonView('list');
  gid('fSave').onclick   = saveForm;
  gid('fDel').onclick    = delEvent;
  gid('fProgram').onchange = () => {
    gid('fProgramOther').style.display = gid('fProgram').value === '__other__' ? 'block' : 'none';
  };

  // 설정
  gid('settingSave').onclick = saveSettings;
  gid('wAddBtn').onclick = addWorker;
  gid('wInp').onkeydown = e => { if(e.key==='Enter'){e.preventDefault();addWorker();} };
  gid('pAddBtn').onclick = addProgram;
  gid('pInp').onkeydown = e => { if(e.key==='Enter'){e.preventDefault();addProgram();} };
  gid('pinChangeBtn').onclick = changePin;
  document.querySelectorAll('[data-close]').forEach(b => b.onclick = () => gid(b.dataset.close).close());

  // 외부 클릭 시 닫기
  document.addEventListener('click', e => {
    const bl = gid('balloon'), mp = gid('morePopup');
    if (!bl.contains(e.target) && !e.target.closest('.day-cell') && !e.target.closest('.chip') && !e.target.closest('.more-btn')) closeBalloon();
    if (!mp.contains(e.target) && !e.target.closest('.more-btn')) closeMorePopup();
  });
}

function setMode(m) {
  st.mode = m;
  gid('tabShift').className = 'mode-tab' + (m==='shift'?' on-shift':'');
  gid('tabProd').className  = 'mode-tab' + (m==='prod'?' on-prod':'');
  closeBalloon(); closeMorePopup();
  render();
}

/* ════════════════════════════════════════════
   캘린더 렌더링
════════════════════════════════════════════ */
function render() {
  const y = st.cur.getFullYear(), m = st.cur.getMonth();
  gid('monthLbl').textContent = `${y}년 ${m+1}월`;
  const grid = gid('calGrid');
  grid.innerHTML = '';

  // 요일 헤더
  WEEKDAYS.forEach((d,i) => {
    const h = el('div','wdhd'+(i===0?' sun':i===6?' sat':''));
    h.textContent = d; grid.append(h);
  });

  const todayIso = isoDate(new Date());
  const firstDay = new Date(y,m,1);
  const startDay = new Date(y,m,1-firstDay.getDay());

  for (let i = 0; i < 42; i++) {
    const date = addDays(startDay, i);
    const iso  = isoDate(date);
    const isOther = date.getMonth() !== m;
    const dow  = date.getDay();
    const hol  = getHol(iso);

    const cell = el('div', [
      'day-cell',
      isOther ? 'other' : '',
      !isOther && dow===0 ? 'sun-c' : '',
      !isOther && dow===6 ? 'sat-c' : '',
      !isOther && iso===todayIso ? 'today-c' : '',
      !isOther && hol ? 'holiday-c' : '',
    ].filter(Boolean).join(' '));
    cell.dataset.iso = iso;

    // 날짜 행
    const dateRow = el('div','date-row');
    const num = el('span','date-num'); num.textContent = date.getDate();
    const badges = el('span','date-badges');
    if (hol && !isOther) { const b=el('span','bdg-hol'); b.textContent=hol; badges.append(b); }
    dateRow.append(num, badges);
    cell.append(dateRow);

    if (!isOther) {
      // 이벤트 목록
      const evs = getEvsByDate(iso);
      const evList = el('div','ev-list');
      evs.slice(0,5).forEach(ev => evList.append(makeChip(ev, iso)));
      cell.append(evList);

      // +N 버튼
      if (evs.length > 5) {
        const more = el('div','more-btn');
        more.textContent = `+${evs.length-5}개 더보기`;
        more.onclick = e => { e.stopPropagation(); openMorePopup(iso, evs, more); };
        cell.append(more);
      }

      // 셀 클릭 → 풍선
      cell.onclick = e => {
        if (e.target.closest('.chip,.more-btn')) return;
        openBalloon(iso, cell);
      };

      // 드래그
      cell.addEventListener('dragover', e => { e.preventDefault(); cell.classList.add('drop-over'); });
      cell.addEventListener('dragleave', () => cell.classList.remove('drop-over'));
      cell.addEventListener('drop', e => { e.preventDefault(); cell.classList.remove('drop-over'); handleDrop(iso); });
    }
    grid.append(cell);
  }
}

/* ════════════════════════════════════════════
   칩 생성
════════════════════════════════════════════ */
function makeChip(ev, cellIso) {
  const c = el('div', 'chip ' + (ev.type==='shift'?'shift-c':'prod-c'));
  c.dataset.id = ev.id;
  c.draggable = true;

  const bar = el('span','chip-bar'); c.append(bar);

  const time = el('span','chip-time');
  time.textContent = ev.timeStart || (ev.type==='shift'? ev.category.slice(0,2) : '');
  c.append(time);

  const lbl = el('span','chip-label');
  lbl.textContent = chipLabel(ev);
  c.append(lbl);

  c.title = chipTooltip(ev);

  c.addEventListener('dragstart', e => {
    st.drag = { ev, fromIso: cellIso };
    c.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  c.addEventListener('dragend', () => c.classList.remove('dragging'));
  c.onclick = e => { e.stopPropagation(); openForm(cellIso, ev); };

  return c;
}

function chipLabel(ev) {
  if (ev.type === 'shift') return `${ev.workerName} ${ev.category}`;
  const parts = [ev.program||'제작'];
  if (ev.title) parts.push(ev.title);
  return parts.join(' · ');
}
function chipTooltip(ev) {
  if (ev.type === 'shift') return `${ev.workerName} | ${ev.category}${ev.memo?'\n'+ev.memo:''}`;
  return `${ev.program||''}${ev.title?' · '+ev.title:''}${ev.timeStart?' · '+ev.timeStart:''}${ev.memo?'\n'+ev.memo:''}`;
}

/* ════════════════════════════════════════════
   풍선 팝업
════════════════════════════════════════════ */
function openBalloon(iso, anchor) {
  st.balloon.iso = iso;
  st.balloon.evId = null;
  showBalloonView('list');
  renderBalloonList(iso);
  positionBalloon(anchor);
  gid('balloon').classList.add('open');
}

function renderBalloonList(iso) {
  gid('blDate').textContent = fmtKorDate(iso);
  const body = gid('blBody');
  body.innerHTML = '';
  const evs = getEvsByDate(iso);
  if (!evs.length) {
    const e = el('div','bl-empty'); e.textContent = '등록된 일정이 없습니다.'; body.append(e);
  } else {
    evs.forEach(ev => {
      const row = el('div','bl-ev-row');
      const bar = el('div','bl-ev-bar');
      bar.style.background = ev.type==='shift' ? 'var(--sc)' : 'var(--pc)';
      const info = el('div','bl-ev-info');
      info.innerHTML = `<div class="bl-ev-name">${esc(chipLabel(ev))}</div><div class="bl-ev-meta">${esc(ev.memo||'')}</div>`;
      const time = el('span','bl-ev-time');
      time.textContent = ev.timeStart || '';
      row.append(bar, info, time);
      row.onclick = () => openForm(iso, ev);
      body.append(row);
    });
  }
}

function positionBalloon(anchor) {
  const bl = gid('balloon');
  bl.style.left = '0px'; bl.style.top = '0px';
  bl.classList.add('open');
  const r = anchor.getBoundingClientRect();
  const bw = bl.offsetWidth || 300, bh = bl.offsetHeight || 320;
  const margin = 10, vw = window.innerWidth, vh = window.innerHeight;

  let left = r.right + margin;
  if (left + bw > vw - margin) left = r.left - bw - margin;
  if (left < margin) left = margin;

  let top = r.top;
  if (top + bh > vh - margin) top = vh - bh - margin;
  if (top < margin) top = margin;

  bl.style.left = Math.round(left) + 'px';
  bl.style.top  = Math.round(top) + 'px';
}

function showBalloonView(view) {
  st.balloon.view = view;
  gid('blList').style.display = view === 'list' ? '' : 'none';
  gid('blForm').style.display = view === 'form' ? '' : 'none';
}

function closeBalloon() {
  gid('balloon').classList.remove('open');
  st.balloon.iso = null; st.balloon.evId = null;
}

/* ════════════════════════════════════════════
   입력 폼
════════════════════════════════════════════ */
function openForm(iso, ev) {
  st.balloon.iso = iso;
  st.balloon.evId = ev ? ev.id : null;
  const isEdit = !!ev;
  const type = ev ? ev.type : st.mode;

  gid('blFormTitle').textContent = isEdit ? '일정 수정' : '일정 추가';
  const badge = gid('blBadge');
  badge.textContent = type === 'shift' ? '근무' : '제작';
  badge.className = 'bl-edit-badge ' + type;
  badge.style.display = isEdit ? '' : 'none';
  gid('fDel').style.display = isEdit ? '' : 'none';

  gid('formShift').style.display = type === 'shift' ? '' : 'none';
  gid('formProd').style.display  = type === 'prod'  ? '' : 'none';

  // 구성원 셀렉트 갱신
  gid('fWorker').innerHTML = st.data.workers.map(w=>`<option>${esc(w)}</option>`).join('');
  // 프로그램 셀렉트 갱신
  gid('fProgram').innerHTML = st.data.programs.map(p=>`<option>${esc(p)}</option>`).join('')
    + '<option value="__other__">직접 입력</option>';
  gid('fProgramOther').style.display = 'none';

  if (type === 'shift') {
    gid('fWorker').value   = ev?.workerName || st.data.workers[0] || '';
    gid('fCategory').value = ev?.category || '휴가';
    gid('fDateS').value    = ev?.dates?.[0] || iso;
    gid('fDateE').value    = ev?.dates?.[ev.dates.length-1] || iso;
    gid('fShiftMemo').value= ev?.memo || '';
  } else {
    const prog = ev?.program || st.data.programs[0] || '';
    if (st.data.programs.includes(prog) || !prog) {
      gid('fProgram').value = prog || st.data.programs[0];
    } else {
      gid('fProgram').value = '__other__';
      gid('fProgramOther').style.display = 'block';
      gid('fProgramOther').value = prog;
    }
    gid('fTitle').value    = ev?.title || '';
    gid('fProdDate').value = ev?.dates?.[0] || iso;
    gid('fTime').value     = ev?.timeStart || '09:00';
    gid('fProdMemo').value = ev?.memo || '';
  }

  showBalloonView('form');
}

async function saveForm() {
  const iso = st.balloon.iso;
  const isEdit = !!st.balloon.evId;
  const type = isEdit
    ? st.data.events.find(e=>e.id===st.balloon.evId)?.type || st.mode
    : st.mode;

  let ev;
  if (type === 'shift') {
    const s = gid('fDateS').value, e = gid('fDateE').value;
    if (!s) { alert('시작일을 선택하세요.'); return; }
    ev = {
      id: isEdit ? st.balloon.evId : uid(),
      type: 'shift',
      dates: dateRange(s, e||s),
      workerName: gid('fWorker').value,
      category:   gid('fCategory').value,
      memo:       gid('fShiftMemo').value.trim(),
      createdAt:  new Date().toISOString(),
    };
  } else {
    let prog = gid('fProgram').value;
    if (prog === '__other__') prog = gid('fProgramOther').value.trim() || '기타';
    const d = gid('fProdDate').value || iso;
    ev = {
      id: isEdit ? st.balloon.evId : uid(),
      type: 'prod',
      dates: [d],
      program:   prog,
      title:     gid('fTitle').value.trim(),
      timeStart: gid('fTime').value || '09:00',
      memo:      gid('fProdMemo').value.trim(),
      createdAt: new Date().toISOString(),
    };
  }

  if (isEdit) {
    st.data.events = st.data.events.map(x => x.id===ev.id ? ev : x);
  } else {
    st.data.events.push(ev);
  }

  LS.save(st.data);
  showBalloonView('list');
  renderBalloonList(iso);
  render();

  // Supabase 저장
  if (SB.ready) {
    setSbStatus('spin');
    try { await SB.upsert([toDbRow(ev)]); setSbStatus('ok'); }
    catch(e) { setSbStatus('err'); }
  }
}

async function delEvent() {
  if (!confirm('이 일정을 삭제할까요?')) return;
  const evId = st.balloon.evId;
  st.data.events = st.data.events.filter(e => e.id !== evId);
  LS.save(st.data);
  const iso = st.balloon.iso;
  st.balloon.evId = null;
  showBalloonView('list');
  renderBalloonList(iso);
  render();
  if (SB.ready) { try { await SB.del(evId); } catch(e) {} }
}

/* ════════════════════════════════════════════
   more 팝업
════════════════════════════════════════════ */
function openMorePopup(iso, evs, anchor) {
  const mp = gid('morePopup');
  gid('morePopupDate').textContent = fmtKorDate(iso);
  const list = gid('morePopupList');
  list.innerHTML = '';
  evs.forEach(ev => {
    const row = el('div','more-popup-row');
    const bar = el('div','mp-bar');
    bar.style.background = ev.type==='shift' ? 'var(--sc)' : 'var(--pc)';
    const lbl = el('span','mp-label'); lbl.textContent = chipLabel(ev);
    const time = el('span','mp-time'); time.textContent = ev.timeStart || '';
    row.append(bar,lbl,time);
    row.onclick = () => { closeMorePopup(); openForm(iso, ev); };
    list.append(row);
  });
  const r = anchor.getBoundingClientRect();
  const mw=260, vw=window.innerWidth, vh=window.innerHeight;
  let left = r.left, top = r.bottom + 6;
  if (left+mw>vw-8) left=vw-mw-8;
  if (left<8) left=8;
  const mh = Math.min(list.scrollHeight+60, 320);
  if (top+mh>vh-8) top=r.top-mh-6;
  mp.style.left=left+'px'; mp.style.top=top+'px';
  mp.classList.add('open');
}
function closeMorePopup() { gid('morePopup').classList.remove('open'); }

/* ════════════════════════════════════════════
   드래그 & 드롭
════════════════════════════════════════════ */
async function handleDrop(toIso) {
  const { ev, fromIso } = st.drag;
  if (!ev || fromIso === toIso) { st.drag = {}; return; }
  const diff = (parseIso(toIso) - parseIso(fromIso)) / 86400000;
  const updated = { ...ev, dates: ev.dates.map(d => isoDate(addDays(parseIso(d), diff))) };
  st.data.events = st.data.events.map(x => x.id===ev.id ? updated : x);
  LS.save(st.data);
  render();
  st.drag = {};
  if (SB.ready) { try { await SB.upsert([toDbRow(updated)]); } catch(e) {} }
}

/* ════════════════════════════════════════════
   설정
════════════════════════════════════════════ */
function openSettings() {
  st.tmp.workers  = [...st.data.workers];
  st.tmp.programs = [...st.data.programs];
  renderWorkers(); renderPrograms();
  gid('pinCur').value=''; gid('pinNew1').value=''; gid('pinNew2').value='';
  gid('dlgSettings').showModal();
}

function renderWorkers() {
  const list = gid('wList');
  list.innerHTML = '';
  gid('wCnt').textContent = `(${st.tmp.workers.length}명)`;
  st.tmp.workers.forEach((w,i) => {
    const chip = el('div','w-chip');
    const inp = el('input','w-inp'); inp.type='text'; inp.value=w;
    inp.oninput = e => st.tmp.workers[i] = e.target.value;
    const del = el('button','w-del'); del.textContent='✕';
    del.onclick = () => { st.tmp.workers.splice(i,1); renderWorkers(); };
    chip.append(inp, del); list.append(chip);
  });
}

function renderPrograms() {
  const list = gid('progList');
  list.innerHTML = '';
  st.tmp.programs.forEach((p,i) => {
    const tag = el('span','prog-tag');
    tag.textContent = p;
    const del = el('button','prog-del'); del.textContent='✕';
    del.onclick = () => { st.tmp.programs.splice(i,1); renderPrograms(); };
    tag.append(del); list.append(tag);
  });
}

function addWorker() {
  const v = gid('wInp').value.trim(); if(!v) return;
  st.tmp.workers.push(v); gid('wInp').value=''; renderWorkers(); gid('wInp').focus();
}

function addProgram() {
  const v = gid('pInp').value.trim(); if(!v) return;
  if (!st.tmp.programs.includes(v)) { st.tmp.programs.push(v); renderPrograms(); }
  gid('pInp').value=''; gid('pInp').focus();
}

function saveSettings() {
  st.data.workers  = st.tmp.workers.length  ? st.tmp.workers  : DEFAULT_WORKERS;
  st.data.programs = st.tmp.programs.length ? st.tmp.programs : DEFAULT_PROGRAMS;
  LS.save(st.data);
  gid('dlgSettings').close();
  render();
}

async function changePin() {
  const cur=gid('pinCur').value, n1=gid('pinNew1').value, n2=gid('pinNew2').value;
  if (cur.length!==4||n1.length!==4||n2.length!==4) { alert('PIN은 4자리여야 합니다.'); return; }
  if (n1!==n2) { alert('새 PIN이 일치하지 않습니다.'); return; }
  if (!(await checkPin(cur))) { alert('현재 PIN이 틀렸습니다.'); return; }
  await setPin(n1);
  alert('PIN이 변경됐습니다.');
  gid('pinCur').value=''; gid('pinNew1').value=''; gid('pinNew2').value='';
}

/* ════════════════════════════════════════════
   데이터 변환
════════════════════════════════════════════ */
function toDbRow(ev) {
  return {
    id: ev.id, type: ev.type,
    date: ev.dates?.[0] || '',
    worker_name: ev.workerName || null,
    category:   ev.category || null,
    program:    ev.program || null,
    title:      ev.title || null,
    time_start: ev.timeStart || null,
    memo:       ev.memo || null,
    created_at: ev.createdAt || new Date().toISOString(),
  };
}

function normEv(row) {
  if (!row?.id || !row?.type) return null;
  return {
    id:         row.id,
    type:       row.type,
    dates:      row.dates || (row.date ? [row.date] : []),
    workerName: row.workerName || row.worker_name || '',
    category:   row.category || '',
    program:    row.program || '',
    title:      row.title || '',
    timeStart:  row.timeStart || row.time_start || '',
    memo:       row.memo || '',
    createdAt:  row.createdAt || row.created_at || new Date().toISOString(),
  };
}

function getEvsByDate(iso) {
  return st.data.events
    .filter(ev => ev.dates?.includes(iso) && ev.type === st.mode)
    .sort((a,b) => {
      const at = a.timeStart||'', bt = b.timeStart||'';
      if(at&&bt) return at.localeCompare(bt);
      if(at) return -1; if(bt) return 1;
      return chipLabel(a).localeCompare(chipLabel(b),'ko');
    });
}

/* ════════════════════════════════════════════
   공휴일
════════════════════════════════════════════ */
function getHol(iso) {
  const y = +iso.slice(0,4);
  if (!HOL_CACHE[y]) HOL_CACHE[y] = buildHol(y);
  return HOL_CACHE[y][iso] || '';
}
function buildHol(y) {
  const map = {};
  const add = (iso,n) => { if(iso&&n) map[iso] = map[iso]?map[iso]+'·'+n:n; };
  FIXED_HOL.forEach(h => {
    const iso = `${y}-${pad(h.m)}-${pad(h.d)}`; add(iso, h.n);
    const wd = parseIso(iso).getDay();
    if (wd===0||wd===6) { let c=addDays(parseIso(iso),wd===0?1:2); while(map[isoDate(c)])c=addDays(c,1); add(isoDate(c),h.n+' 대체'); }
  });
  const lu = LUNAR[y];
  if (lu) {
    if (lu.s) { const d=parseIso(lu.s); [-1,0,1].forEach(x=>add(isoDate(addDays(d,x)),'설날')); }
    if (lu.c) { const d=parseIso(lu.c); [-1,0,1].forEach(x=>add(isoDate(addDays(d,x)),'추석')); }
    if (lu.b) add(lu.b,'부처님오신날');
  }
  Object.entries(ONE_HOL).forEach(([i,n]) => { if(+i.slice(0,4)===y) add(i,n); });
  return map;
}

/* ════════════════════════════════════════════
   유틸
════════════════════════════════════════════ */
function startOfMonth(d)  { return new Date(d.getFullYear(),d.getMonth(),1); }
function addDays(d,n)     { const c=new Date(d); c.setDate(c.getDate()+n); return c; }
function addMonths(d,n)   { return new Date(d.getFullYear(),d.getMonth()+n,1); }
function isoDate(d)       { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function parseIso(s)      { const[y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function fmtKorDate(iso)  { const d=parseIso(iso); return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일(${WEEKDAYS[d.getDay()]})`; }
function dateRange(s,e)   { const res=[]; let c=parseIso(s); while(isoDate(c)<=e){res.push(isoDate(c));c=addDays(c,1);} return res; }
function uid()            { return crypto.randomUUID?.() ?? `id-${Date.now()}-${Math.random().toString(16).slice(2)}`; }
function pad(n)           { return String(n).padStart(2,'0'); }
function esc(s)           { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function gid(s)           { return document.getElementById(s); }
function el(tag,cls)      { const e=document.createElement(tag); if(cls)e.className=cls; return e; }
function setSbStatus(s)   {
  gid('sbDot').className = 'sb-dot'+(s==='ok'?' ok':s==='err'?' err':s==='spin'?' spin':'');
  gid('sbTxt').textContent = s==='ok'?'Supabase':s==='err'?'오류':s==='spin'?'연결 중':'로컬';
}

init();
</script>
