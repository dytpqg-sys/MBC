// 프로그램 선택 팝오버 (뉴스·제작)
// ══════════════════════════════════════════════════
function openProg(type, idx, anchorEl) {
  // 편집 잠금 체크
  const _dayProg = allDays[idx];
  const _stepProg = apprStep(_dayProg);
  if (_stepProg >= 2 || (_stepProg === 1 && currentRole !== 'team')) {
    toast('🔒 편집이 잠겨 있습니다'); return;
  }
  progCtx = {type, idx};
  const day    = allDays[idx];
  const anchor = anchorEl || document.getElementById(`pr_${type}_${idx}`)?.closest('.prog-col');

  if (type === 'news') {
    const items   = CFG.news || [];
    const checked = day?.news?.checked || [];
    const etcVal  = day?.news?.etc || '';
    const html = `<div class="pop-title">뉴스 항목</div>`
      + items.map((item,i)=>{
          const isChecked = checked.includes(item);
          const isEtc = item==='기타';
          return `<div class="ci">
            <div class="ci-row">
              <input type="checkbox" id="pc_${i}" ${isChecked?'checked':''} onchange="onProgCheck(${i})">
              <label for="pc_${i}" style="cursor:pointer">${esc(item)}</label>
            </div>
            ${isEtc?`<input class="ci-etc ${isChecked?'show':''}" id="petc" placeholder="내용" value="${esc(etcVal)}">`:''}</div>`;
        }).join('')
      + `<button class="pop-confirm" onclick="applyProg()">확인</button>`;
    showUiPop(anchor, html);

  } else {
    const fixedItems = (CFG.prod||[]).filter(x=>x!=='기타');
    const checked    = day?.prod?.checked || [];
    const etcLines   = day?.prod?.etcLines || (day?.prod?.etc?[day.prod.etc]:[]);
    const html = `<div class="pop-title">제작 항목</div>`
      + fixedItems.map((item,i)=>{
          const isChecked = checked.includes(item);
          return `<div class="ci">
            <div class="ci-row">
              <input type="checkbox" id="pc_${i}" ${isChecked?'checked':''}>
              <label for="pc_${i}" style="cursor:pointer">${esc(item)}</label>
            </div></div>`;
        }).join('')
      + `<div class="etc-section-lbl">기타 (줄바꿈으로 구분)</div>
         <textarea class="etc-ta" id="prodEtcArea" rows="3"
           placeholder="항목 1&#10;항목 2">${esc(etcLines.join('\n'))}</textarea>
         <button class="pop-confirm" onclick="applyProg()">확인</button>`;
    showUiPop(anchor, html);
  }
}

function onProgCheck(i) {
  if (progCtx.type !== 'news') return;
  const cb   = document.getElementById(`pc_${i}`);
  const items = CFG.news || [];
  if (items[i]==='기타') {
    const inp = document.getElementById('petc');
    if (inp) inp.classList.toggle('show', cb.checked);
  }
}

function applyProg() {
  const {type, idx} = progCtx;
  const day = allDays[idx];
  if (!day[type]) day[type] = {checked:[], etc:'', etcLines:[]};

  if (type === 'news') {
    // 뉴스: 기존 방식
    const items = CFG.news || [];
    const checked = [];
    items.forEach((item,i)=>{
      const cb = document.getElementById(`pc_${i}`);
      if (cb?.checked) checked.push(item);
    });
    const etcInp = document.getElementById('petc');
    const etcVal = (etcInp && checked.includes('기타')) ? etcInp.value.trim() : '';
    // '기타' 체크됐지만 내용 없으면 checked에서 제외
    const checkedFinal = checked.filter(item => item!=='기타' || etcVal);
    day.news.checked = checkedFinal;
    day.news.etc     = etcVal;

    const box = document.getElementById(`pr_news_${idx}`);
    if (box) {
      let n = 0;
      box.innerHTML = checkedFinal.map(item=>{
        const label = (item==='기타') ? etcVal : item;
        if (!label) return '';
        n++;
        return `<div class="prog-item"><span class="prog-num">${n}</span>${esc(label)}</div>`;
      }).filter(Boolean).join('');
    }

  } else {
    // 제작: 고정 항목 + 기타 여러 줄
    const fixedItems = (CFG.prod || []).filter(x => x !== '기타');
    const checked = [];
    fixedItems.forEach((item,i)=>{
      const cb = document.getElementById(`pc_${i}`);
      if (cb?.checked) checked.push(item);
    });
    const etcArea  = document.getElementById('prodEtcArea');
    const etcLines = etcArea
      ? etcArea.value.split('\n').map(s=>s.trim()).filter(Boolean)
      : [];

    day.prod.checked  = checked;
    day.prod.etcLines = etcLines;
    day.prod.etc      = etcLines[0] || '';  // 하위 호환

    const box = document.getElementById(`pr_prod_${idx}`);
    if (box) {
      let n = 0;
      const fixedHtml = checked.map(item=>{
        n++;
        return `<div class="prog-item"><span class="prog-num">${n}</span>${esc(item)}</div>`;
      }).join('');
      const etcHtml = etcLines.map(line=>{
        n++;
        return `<div class="prog-item"><span class="prog-num">${n}</span>${esc(line)}</div>`;
      }).join('');
      box.innerHTML = fixedHtml + etcHtml;
    }
  }

  closeUiPop();
  scheduleAutoSave();
}

// ══ 사이드바 검색 ════════════════════════════════════════════════
// ── 태그 빠른필터 버튼 렌더 ────────────────────────────────────────
let _activeTagFilter = '';   // 현재 클릭된 태그 필터
let _tagFilterOpen   = false; // 태그 필터 열림 상태

function toggleTagFilterRow() {
  _tagFilterOpen = !_tagFilterOpen;
  const row    = document.getElementById('tagFilterRow');
  const toggle = document.getElementById('tagFilterToggle');
  const lbl    = document.getElementById('tagFilterToggleLbl');
  if (!row) return;
  if (_tagFilterOpen) {
    row.style.display = 'flex';
    if (toggle) { toggle.style.borderColor='var(--blue)'; toggle.style.color='var(--blue)'; toggle.style.background='var(--blue-lt)'; }
    if (lbl) lbl.textContent = '▴';
  } else {
    row.style.display = 'none';
    _activeTagFilter = '';
    if (toggle) { toggle.style.borderColor=''; toggle.style.color=''; toggle.style.background=''; }
    if (lbl) lbl.textContent = '▾';
    doSideSearch();
  }
  renderTagFilterRow();
}

function renderTagFilterRow() {
  const row    = document.getElementById('tagFilterRow');
  const toggle = document.getElementById('tagFilterToggle');
  if (!row) return;

  // 실제 사용된 태그만 수집
  const usedTags = new Set();
  allDays.forEach(d => {
    if (d.tagPane?.left)  usedTags.add(d.tagPane.left);
    if (d.tagPane?.right) usedTags.add(d.tagPane.right);
  });
  const tagList = (CFG.tags || []).filter(t => usedTags.has(t));

  // 사용된 태그 없으면 토글 버튼 숨김
  if (!tagList.length) {
    if (toggle) toggle.style.display = 'none';
    row.style.display = 'none';
    return;
  }
  if (toggle) toggle.style.display = '';

  // 열린 상태가 아니면 row 숨김
  if (!_tagFilterOpen) {
    row.style.display = 'none';
    return;
  }

  // 버튼 렌더
  row.innerHTML = tagList.map(t => {
    const active = (_activeTagFilter === t);
    return `<button class="tag-filter-btn ${active?'active':''}"
      data-tag="${esc(t)}"
      onclick="setTagFilter(this.dataset.tag)">${esc(t)}</button>`;
  }).join('');
  row.style.display = 'flex';
}

function setTagFilter(tag) {
  // 같은 태그 클릭 시 해제 (토글)
  _activeTagFilter = (_activeTagFilter === tag) ? '' : tag;
  renderTagFilterRow();
  // 태그 필터 적용 시 키워드 검색창도 갱신
  const kwEl = document.getElementById('sideKw');
  if (_activeTagFilter) {
    if (kwEl) kwEl.value = '';  // 키워드 초기화 후 태그만으로 검색
  }
  doSideSearch();
}

function doSideSearch() {
  const kw  = (document.getElementById('sideKw')?.value || '').trim().toLowerCase();
  const res = document.getElementById('sideSearchResults');
  if (!res) return;

  // 키워드도 없고 태그필터도 없으면 결과 숨김
  if (!kw && !_activeTagFilter) {
    res.style.display='none'; res.innerHTML='';
    return;
  }

  // 기간 필터
  const usePeriod = document.getElementById('usePeriod')?.checked;
  const from = usePeriod ? (document.getElementById('srchFrom')?.value||'') : '';
  const to   = usePeriod ? (document.getElementById('srchTo')?.value||'') : '';

  const hits = allDays.filter(day => {
    if (from && day.date < from) return false;
    if (to   && day.date > to)   return false;
    // 태그 빠른필터 우선 적용
    if (_activeTagFilter) {
      const tL = day.tagPane?.left  || '';
      const tR = day.tagPane?.right || '';
      if (tL !== _activeTagFilter && tR !== _activeTagFilter) return false;
    }
    // 키워드 검색
    if (kw) {
      const h = [
        day.etc_left||'', day.etc_right||'',
        day.tagPane?.left||'', day.tagPane?.right||'',
      ].join(' ').toLowerCase();
      if (!h.includes(kw)) return false;
    }
    return true;
  }).slice(0, 30);

  res.style.display = 'block';
  if (!hits.length) {
    res.innerHTML = '<div class="src-empty">결과 없음</div>';
    return;
  }

  // 키워드 하이라이트 함수
  function highlight(text, kw) {
    if (!kw || !text) return esc(text||'');
    const idx = text.toLowerCase().indexOf(kw);
    if (idx < 0) return esc(text);
    return esc(text.slice(0,idx))
      + `<mark style="background:#fff176;color:#000;border-radius:2px;padding:0 1px;">${esc(text.slice(idx,idx+kw.length))}</mark>`
      + esc(text.slice(idx+kw.length));
  }

  res.innerHTML = hits.map(day => {
    const ri = allDays.findIndex(d=>d.date===day.date);

    // pane별 태그 (string)
    const tagL = day.tagPane?.left  || '';
    const tagR = day.tagPane?.right || '';

    // 매칭 pane 판별
    const leftMatch  = !kw  // 태그필터만일 때: 태그가 left에 있으면 left 매칭
      ? (_activeTagFilter && tagL === _activeTagFilter)
      : ((day.etc_left||'').toLowerCase().includes(kw) || tagL.toLowerCase().includes(kw));
    const rightMatch = !kw
      ? (_activeTagFilter && tagR === _activeTagFilter)
      : ((day.etc_right||'').toLowerCase().includes(kw) || tagR.toLowerCase().includes(kw));

    // 결과 카드에 표시할 태그: 매칭된 pane의 태그만
    // 태그 빠른필터: 해당 태그가 있는 pane만 / 키워드: 매칭 pane만
    const showTags = [];
    if (leftMatch  && tagL) showTags.push({tag:tagL, pane:'left'});
    if (rightMatch && tagR) showTags.push({tag:tagR, pane:'right'});
    // 매칭 없어도 태그는 있으면 표시 (태그필터 외 검색)
    if (!showTags.length) {
      if (tagL) showTags.push({tag:tagL, pane:'left'});
      if (tagR) showTags.push({tag:tagR, pane:'right'});
    }

    // 미리보기: 키워드 매칭 위치 발췌 / 태그 필터만일 때는 앞 50자
    let preview = '';
    if (kw) {
      const etcAll = [
        (leftMatch||!rightMatch) ? day.etc_left||'' : '',
        rightMatch                ? day.etc_right||'' : '',
      ].join(' ').trim();
      const pi = etcAll.toLowerCase().indexOf(kw);
      if (pi >= 0) {
        const before  = etcAll.slice(Math.max(0, pi-5), pi);
        const matched = etcAll.slice(pi, pi+kw.length);
        const after   = etcAll.slice(pi+kw.length, pi+kw.length+5);
        preview = (pi>5?'…':'')+before+matched+after+(pi+kw.length+5<etcAll.length?'…':'');
      }
    } else if (_activeTagFilter) {
      const _tL = day.tagPane?.left  || '';
      const _tR = day.tagPane?.right || '';
      const _etcPrev = (_tL===_activeTagFilter ? day.etc_left||'' : _tR===_activeTagFilter ? day.etc_right||'' : '').trim();
      if (_etcPrev) {
        const firstLine = _etcPrev.split('\n')[0].trim();
        preview = firstLine.slice(0,30) + (firstLine.length>30?'…':'');
      }
    }

    // 태그 칩 렌더
    const tagChips = showTags.map(({tag, pane}) => {
      const isActive = _activeTagFilter===tag || (kw && tag.toLowerCase().includes(kw));
      return `<span style="display:inline-flex;align-items:center;
        padding:1px 7px;border-radius:10px;font-size:10.5px;font-weight:700;
        background:${isActive?'var(--blue)':'var(--gray2)'};
        color:${isActive?'#fff':'var(--text2)'};margin-right:3px;">${esc(tag)}</span>`;
    }).join('');

    return `<div class="search-result-card" onclick="jumpTo(${ri})">
      <div class="src-date">${fmtDate(day.date)}</div>
      ${tagChips ? `<div class="src-tags">${tagChips}</div>` : ''}
      ${preview  ? `<div class="src-preview">${highlight(preview, kw)}</div>` : ''}
    </div>`;
  }).join('');
}

async function doPdfPrint() {
  const from = document.getElementById('pdfFrom')?.value;
  const to   = document.getElementById('pdfTo')?.value;
  if (!from||!to) { toast('날짜를 선택하세요'); return; }
  if (from > to)  { toast('시작 날짜가 종료 날짜보다 늦습니다'); return; }
  closeUiPop();
  collectCurrentDay();

  const days = allDays.filter(d=> d.date>=from && d.date<=to);
  if (!days.length) { toast('해당 기간에 일지가 없습니다'); return; }

  // 라이브러리 확인
  if (!window.jspdf || !window.html2canvas) {
    toast('⏳ PDF 라이브러리 로딩 중... 잠시 후 다시 시도하세요');
    return;
  }

  toast('📄 PDF 생성 중...');

  // A4 치수 (mm→pt: 1mm = 2.8346pt)
  const A4_W = 210;   // mm
  const A4_H = 297;   // mm
  const PAD_TOP  = 25; // mm 상단 여백 (철공)
  const PAD_SIDE = 10; // mm 좌우 여백
  const PAD_BOT  = 15; // mm 하단 여백
  const CARD_H   = 125; // mm 카드 1개 고정 높이
  // 내용 너비 (mm)
  const CONTENT_W = A4_W - PAD_SIDE * 2; // 190mm

  // 숨김 렌더 컨테이너 생성
  const offscreen = document.createElement('div');
  offscreen.style.cssText = `
    position:fixed; left:-9999px; top:0;
    width:${CONTENT_W}mm;
    background:#fff;
    font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
    font-size:9pt;
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
  `;
  // print 클래스 강제 적용을 위해 body에 print 스타일 인라인 주입
  offscreen.setAttribute('data-pdf', 'true');
  document.body.appendChild(offscreen);

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit:'mm', format:'a4', orientation:'portrait' });

  try {
    // 2개씩 묶어 페이지 생성
    for (let i=0; i<days.length; i+=2) {
      const idxA = allDays.indexOf(days[i]);
      const idxB = (i+1 < days.length) ? allDays.indexOf(days[i+1]) : -1;

      // 카드 2개 HTML 삽입
      offscreen.innerHTML = '';
      const wrapA = _buildPrintCard(days[i], idxA, CONTENT_W, CARD_H);
      offscreen.appendChild(wrapA);
      if (idxB >= 0) {
        const wrapB = _buildPrintCard(days[i+1], idxB, CONTENT_W, CARD_H);
        offscreen.appendChild(wrapB);
      }

      // 렌더 대기
      await new Promise(r=>setTimeout(r, 300));

      // html2canvas로 캡처 (190mm → px 변환, 96dpi 기준)
      const PX_PER_MM = 3.7795; // 96dpi
      const canvas = await html2canvas(offscreen, {
        scale: 2,  // 고해상도
        useCORS: true,
        backgroundColor: '#ffffff',
        width:  Math.round(CONTENT_W * PX_PER_MM),
        height: Math.round(CARD_H * 2 * PX_PER_MM),
        windowWidth: Math.round(CONTENT_W * PX_PER_MM),
      });

      // PDF에 이미지 삽입
      if (i > 0) pdf.addPage();
      const imgData = canvas.toDataURL('image/jpeg', 0.95);
      pdf.addImage(imgData, 'JPEG', PAD_SIDE, PAD_TOP, CONTENT_W, CARD_H * 2);
    }

    // 파일명: 방송기술부일지_20260526~20260527.pdf
    const fname = `방송기술부일지_${from.replace(/-/g,'')}~${to.replace(/-/g,'')}.pdf`;
    pdf.save(fname);
    toast(`✅ PDF 저장: ${fname}`);
  } catch(e) {
    console.error('PDF 생성 오류:', e);
    toast('❌ PDF 생성 실패: ' + e.message);
  } finally {
    document.body.removeChild(offscreen);
  }
}

function openRoleLoginPop(anchor, role) {
  loginTarget = role;

  const panel = document.getElementById('authPanel');

async function doRoleLogin(role) {
  if (!role) return;
  const inp = document.getElementById('authPwInput');
  const err = document.getElementById('authPanelErr');
  const pw  = inp?.value || '';
  if (err) err.textContent = '';
  let ok = false;
  if (CFG.sb.url && CFG.sb.key) {
    ok = await sbVerifyApprover(role, pw);
  } else {
    const def = {team:'1', dir:'2', general1:'1', general2:'1'};
    ok = (await sha256(pw)) === (await sha256(def[role]||'1'));
  }
  if (ok) {
    setRole(role);
    closeAuthPanel();
  } else {
    if (err) err.textContent = '❌ 틀렸습니다';
    if (inp) { inp.value=''; inp.focus(); }
  }
}

function setRole(role) {
  currentRole=role;
  // 역할은 메모리 변수로만 유지 (새로고침 시 초기화)
  const labels={general: window._currentGeneralName||'담당', team:'부장', dir:'국장'};
  const _rl = document.getElementById('curRoleLabel'); if(_rl) _rl.innerHTML=`현재: <strong>${labels[role]}</strong>`;
  // appr-role-hdr active + 로그인 이름 갱신
  document.querySelectorAll('.appr-role-hdr').forEach(hdr=>{
    const r = hdr.closest('.appr-col')?.querySelector('.appr-cell')?.id?.split('_')[1];
    const isActive = r===role;
    hdr.classList.toggle('active-hdr', isActive);
    const roleText = {general:'담당',team:'부장',dir:'국장'}[r]||'';
    // 평상시: 역할명, 로그인 시: 실제 이름
    let hdrDisplay = roleText;
    if (isActive) {
      if (r==='general') hdrDisplay = window._currentGeneralName || roleText;
      else if (r==='team') hdrDisplay = CFG.staff.team?.[0] || roleText;
      else if (r==='dir')  hdrDisplay = CFG.staff.dir?.[0]  || roleText;
    }
    hdr.innerHTML = esc(hdrDisplay);
    hdr.onclick = r==='general'
      ? (e=>{openGeneralLoginPop(hdr);e.stopPropagation();})
      : (e=>{openRoleLoginPop(hdr,r);e.stopPropagation();});
  });
  // 결재 버튼 lock 상태 갱신
  allDays.forEach((_,i)=>{
    const gCell = document.getElementById(`ab_general_${i}`);
    const tCell = document.getElementById(`ab_team_${i}`);
    const dCell = document.getElementById(`ab_dir_${i}`);
    // 담당: general 로그인 시만 활성 (결재 순서 + 취소에서도 체크하므로 UI잠금은 선택적)
    if (gCell) gCell.classList.toggle('locked', role!=='general');
    if (tCell) tCell.classList.toggle('locked', role!=='team');
    if (dCell) dCell.classList.toggle('locked', role!=='dir');
    // 로그인 상태 변화에 따른 편집 잠금 재갱신
    updateApprStep(i);
  });
}

function openAdminLoginPop() {
  const anchor = document.getElementById('btnSettings');

  // 핀패드 숫자 버튼 (0~9 + 삭제)
  const html = `
    <div style="padding:6px 4px 2px;">
      <!-- 타이틀 -->
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
        <div style="width:30px;height:30px;border-radius:8px;flex-shrink:0;
             background:linear-gradient(135deg,#1a3a6b,#2a5298);
             display:flex;align-items:center;justify-content:center;">
          <span style="font-size:15px;line-height:1;">🔐</span>
        </div>
        <span style="font-size:13px;font-weight:700;color:#1a1d23;">관리자 확인</span>
      </div>

      <!-- 도트 + 오류 -->
      <div style="text-align:center;margin-bottom:12px;">
        <div id="adminDots" style="display:flex;justify-content:center;gap:12px;margin-bottom:6px;">
          <span class="pin-dot"></span>
          <span class="pin-dot"></span>
          <span class="pin-dot"></span>
          <span class="pin-dot"></span>
        </div>
        <div id="adminPwErr" style="font-size:10.5px;color:var(--red);min-height:14px;"></div>
      </div>

      <!-- 핀패드: 버튼 44×40, gap 5 -->
      <div style="display:grid;grid-template-columns:repeat(3,44px);
                  gap:5px;justify-content:center;">
        ${[1,2,3,4,5,6,7,8,9].map(n=>
          `<button class="pin-btn" onclick="_pinInput(${n})">${n}</button>`
        ).join('')}
        <button class="pin-btn pin-clear" onclick="_pinClear()">⌫</button>
        <button class="pin-btn" onclick="_pinInput(0)">0</button>
        <button class="pin-btn pin-ok" onclick="doAdminLogin()">✓</button>
      </div>
    </div>`;

  showUiPop(anchor, html, null, true);

  // 핀 입력 상태 초기화
  window._pinVal = '';
  _updatePinDots();

  setTimeout(()=>{
    // 키보드 숫자도 받기
    const handler = e=>{
      e.stopPropagation();
      if (e.key>='0' && e.key<='9') _pinInput(Number(e.key));
      else if (e.key==='Backspace') _pinClear();
      else if (e.key==='Enter')     doAdminLogin();
      else if (e.key==='Escape')    closeUiPop();
    };
    document.addEventListener('keydown', handler, true);
    // 팝업 닫힐 때 핸들러 제거
    window._pinKeyHandler = handler;
  }, 60);
}

function _pinInput(n) {
  if ((window._pinVal||'').length >= 4) return;
  window._pinVal = (window._pinVal||'') + String(n);
  _updatePinDots();
  if (window._pinVal.length === 4) {
    // 4자리 완성 → 자동 확인
    setTimeout(doAdminLogin, 120);
  }
}
function _pinClear() {
  window._pinVal = (window._pinVal||'').slice(0,-1);
  _updatePinDots();
  const err = document.getElementById('adminPwErr');
  if (err) err.textContent = '';
}
function _updatePinDots() {
  const dots = document.querySelectorAll('#adminDots .pin-dot');
  const len = (window._pinVal||'').length;
  dots.forEach((d,i)=> d.classList.toggle('filled', i < len));
}

async function doAdminLogin() {
  const pw  = window._pinVal || '';
  const err = document.getElementById('adminPwErr');
  if (err) err.textContent = '';
  let ok = false;
  if (CFG.sb.url && CFG.sb.key) {
    ok = await sbVerifyApprover('admin', pw);
  } else {
    // Supabase 미설정 시: localStorage 해시 또는 기본 '0000'
    // Supabase 미설정 시 기본 비번 '0000'
    ok = (await sha256(pw) === await sha256('0000'));
  }
  if (ok) {
    isAdmin = true;
    if (window._pinKeyHandler) {
      document.removeEventListener('keydown', window._pinKeyHandler, true);
      window._pinKeyHandler = null;
    }
    window._pinVal = '';
    closeUiPop();
    updateAdminBadge();
    toast('🔓 관리자 로그인 완료');
    setTimeout(()=> openSettingsPop(), 150);
  } else {
    if (err) err.textContent = '❌ 비밀번호가 틀렸습니다';
    window._pinVal = '';
    _updatePinDots();
  }
}

function adminLogout() {
  isAdmin = false;
  updateAdminBadge();
  closeUiPop();
  toast('🔒 관리자 로그아웃');
}

// 설정 탭 전환
function stab(id) {
  if (!window._settingsPanels) return;
  const pop = document.getElementById('uiPop');
  const content = pop.querySelector('#sContent');
  if (!content) return;
  content.innerHTML = window._settingsPanels[id] || '';
  // 탭 전환 후 maxHeight 재계산 (내용 높이 변화)
  requestAnimationFrame(()=>{
    const viewH = window.innerHeight;
    const popTop = parseInt(pop.style.top)||0;
    const margin = 10;
    const available = viewH - popTop - margin;
    if (available < pop.scrollHeight) {
      pop.style.maxHeight = Math.max(200, available) + 'px';
    } else {
      pop.style.maxHeight = (viewH - margin*2) + 'px';
    }
  });
  // 버튼 활성 상태
  pop.querySelectorAll('[id^="stb_"]').forEach(btn=>{
    const active = btn.id === 'stb_' + id;
    btn.style.background = active ? 'var(--blue)' : '#f0f2f5';
    btn.style.color = active ? '#fff' : '#555';
  });
  // 인원 탭 값 채우기
  const fill = (i,v) => { const el = content.querySelector('#'+i); if(el) el.value = v; };
  if (id==='staff') {
    fill('cfgTd',      (CFG.staff.td||[]).join('\n'));
    fill('cfgAud',     (CFG.staff.aud||[]).join('\n'));
    fill('cfgVid',     (CFG.staff.vid||[]).join('\n'));
    fill('cfgGeneral', (CFG.staff.general||[]).join('\n'));
    fill('cfgTeam',    (CFG.staff.team||[]).join('\n'));
    fill('cfgDir',     (CFG.staff.dir||[]).join('\n'));
  } else if (id==='prog') {
    fill('cfgNews', (CFG.news||[]).join('\n'));
    fill('cfgProd', (CFG.prod||[]).join('\n'));
  } else if (id==='tags') {
    fill('cfgTags', (CFG.tags||[]).join('\n'));
  } else if (id==='sign') {
    loadSignPreviews();
  }
  // 새로 생성된 요소들 이벤트 차단
  content.querySelectorAll('input,textarea,button,label').forEach(el=>{
    el.addEventListener('pointerdown', e=>e.stopPropagation());
    el.addEventListener('click', e=>e.stopPropagation());
  });
}

// 설정 팝오버용 저장 함수들
function cfgSbSave() {
  const g = id => document.getElementById(id)?.value?.trim()||'';
  CFG.sb.url=g('cfgSbUrl'); CFG.sb.key=g('cfgSbKey'); CFG.sb.table=g('cfgSbTable')||'worklog_news';
  saveCfg(); toast('✅ Supabase 설정 저장됨');
}
async function cfgSbTest() {
  cfgSbSave();
  const st = document.getElementById('sbStatus');
  if(st){st.style.display='block';st.className='cfg-status';st.textContent='연결 확인 중...';}
  const r = await sbTest();
  if(st){st.className='cfg-status '+(r.ok?'ok':'err');st.textContent=r.msg;}
}
function cfgStaffSave() {
  const p = id => (document.getElementById(id)?.value||'').split('\n').map(s=>s.trim()).filter(Boolean);
  CFG.staff.td=p('cfgTd'); CFG.staff.aud=p('cfgAud'); CFG.staff.vid=p('cfgVid');
  CFG.staff.general=p('cfgGeneral');
  CFG.staff.team=p('cfgTeam'); CFG.staff.dir=p('cfgDir');
  // 담당 초기값도 업데이트
  // 로그인 상태가 아니면 '담당' 유지
  if (!window._currentGeneralName || !CFG.staff.general.includes(window._currentGeneralName)) {
    window._currentGeneralName = currentRole === 'general'
      ? (CFG.staff.general[0] || '담당')
      : '담당';
  }
  saveCfg(); render();
  // 결재 헤더 이름 재갱신 (setRole로 active-hdr 및 이름 반영)
  setRole(currentRole);
  toast('✅ 인원 설정 저장됨');
}
function cfgProgSave() {
  const p = id => (document.getElementById(id)?.value||'').split('\n').map(s=>s.trim()).filter(Boolean);
  CFG.news=p('cfgNews'); CFG.prod=p('cfgProd');
  saveCfg(); render(); toast('✅ 프로그램 설정 저장됨');
}
function cfgTagsSave() {
  CFG.tags = (document.getElementById('cfgTags')?.value||'')
    .split('\n').map(s=>s.trim())
    .filter(s => s && s.length<=20 && !s.includes('://'));
  saveCfg(); render(); toast('✅ 태그 저장됨');
}
// ── 비밀번호 저장 (설정 팝오버에서 호출) ─────────────────────────────────────
async function savePwGeneral(role) {
  // role: 'general1' 또는 'general2'
  const idSfx = role.replace(/[^a-z0-9]/gi,'');
  const oldEl = document.getElementById('pw_old_'+idSfx);
  const nw    = document.getElementById('pw_new_'+idSfx)?.value;
  const cf    = document.getElementById('pw_cf_'+idSfx)?.value;
  if (!nw) { toast('새 비밀번호를 입력하세요'); return; }
  if (nw !== cf) { toast('비밀번호가 일치하지 않습니다'); return; }
  const oldPw = oldEl?.value || '';
  const ok = await sbChangePassword(role, oldPw, nw);
  if (ok) {
    toast('✅ ' + role + ' 비밀번호 저장됨');
    if (oldEl) oldEl.value='';
    document.getElementById('pw_new_'+idSfx).value='';
    document.getElementById('pw_cf_'+idSfx).value='';
  } else {
    toast('❌ 현재 비밀번호가 틀렸습니다 (미설정 시 현재 비번 비워두세요)');
  }
}
async function savePwRole(role) {
  const idSfx = role;
  const oldPw = document.getElementById('pw_old_'+idSfx)?.value || '';
  const nw    = document.getElementById('pw_new_'+idSfx)?.value;
  const cf    = document.getElementById('pw_cf_'+idSfx)?.value;
  const stEl  = document.getElementById('pw_status_'+idSfx);
  if (!nw) { toast('새 비밀번호를 입력하세요'); return; }
  if (nw !== cf) { toast('비밀번호가 일치하지 않습니다'); return; }
  if (stEl) stEl.textContent = '저장 중...';
  const ok = await sbChangePassword(role, oldPw, nw);
  if (ok) {
    if (stEl) { stEl.textContent='✅ 변경 완료'; stEl.style.color='green'; }
    toast(`✅ ${role==='admin'?'관리자':role} 비밀번호 변경 완료`);
    ['pw_old_','pw_new_','pw_cf_'].forEach(p=>{
      const el=document.getElementById(p+idSfx); if(el) el.value='';
    });
  } else {
    if (stEl) { stEl.textContent='❌ 현재 비밀번호 오류'; stEl.style.color='red'; }
    toast('❌ 현재 비밀번호가 틀렸습니다');
  }
}

async function cfgPwSave() {
  if (currentRole!=='team'&&currentRole!=='dir') { toast('❌ 부장 또는 국장으로 로그인하세요'); return; }
  const nw = document.getElementById('cfgPwNew')?.value;
  const cf = document.getElementById('cfgPwConfirm')?.value;
  if (!nw) { toast('새 비밀번호를 입력하세요'); return; }
  if (nw!==cf) { toast('비밀번호가 일치하지 않습니다'); return; }
  const oldPw = prompt('현재 비밀번호를 입력하세요:');
  if (oldPw===null) return;
  const ok = await sbChangePassword(currentRole, oldPw, nw);
  if (ok) toast('✅ 비밀번호 변경 완료');
  else    toast('❌ 현재 비밀번호가 틀렸거나 Supabase 오류');
}

// ══════════════════════════════════════════════════
// 키보드 단축키
// ══════════════════════════════════════════════════
document.addEventListener('keydown', e=>{
  if (e.ctrlKey||e.metaKey) {
    if (e.key==='s') { e.preventDefault(); doSave(false); return; }
    if (e.key==='f') { e.preventDefault(); document.getElementById('sideKw')?.focus(); return; }
  }
  // ESC: 팝오버 닫기 우선순위
  if (e.key==='Escape') {
    const uiPop = document.getElementById('uiPop');
    if (uiPop?.classList.contains('open')) { closeUiPop(); return; }
    const calPop = document.getElementById('calPopover');
    if (calPop?.classList.contains('open')) { calPop.classList.remove('open'); return; }
    const authPanel = document.getElementById('authPanel');
    if (authPanel?.classList.contains('open')) { closeAuthPanel(); return; }
    const calView = document.getElementById('calView');
    if (calView?.classList.contains('active')) { switchMainTab('log'); return; }
  }
  if (!e.target.matches('input,textarea,select')) {
    if (e.key==='ArrowLeft')  { e.preventDefault(); collectCurrentDay(); if(viewIdx>0){viewIdx--;render();} }
    if (e.key==='ArrowRight') { e.preventDefault(); collectCurrentDay(); if(viewIdx<allDays.length-1){viewIdx++;render();} }
  }
});

// ══════════════════════════════════════════════════
// 초기화
// ══════════════════════════════════════════════════
async function init() {
  try {
    // 검색창 자동완성 값 강제 초기화
    setTimeout(()=>{
      const kw = document.getElementById('sideKw');
      if (kw) kw.value = '';
    }, 100);
    // 역할은 세션 시작 시 항상 초기화 (새로고침 = 로그아웃)
    currentRole = 'general';
    window._currentGeneralName = '담당';  // 로그인 전 기본값
    const loaded = await doLoad();
    if (!loaded || !allDays.length) {
      allDays = [newDayData(today())];
      viewIdx = 0;
    } else {
      // 오늘 날짜 일지가 있으면 오늘로, 없으면 마지막 날짜
      const todayKey = today();
      const todayIdx = allDays.findIndex(d => d.date === todayKey);
      viewIdx = todayIdx >= 0 ? todayIdx : allDays.length - 1;
    }
    setRole(currentRole);
    render();
  } catch(e) {
    console.error('init 오류:', e);
    // 오류 내용 화면에 표시 (진단용)
    try {
      document.getElementById('logContainer').innerHTML =
        `<div style="padding:20px;color:red;font-size:12px;word-break:break-all;">
          <b>⚠️ 초기화 오류:</b><br>${e.name}: ${e.message}<br>
          <pre style="font-size:10px;margin-top:8px;">${(e.stack||'').slice(0,300)}</pre>
        </div>`;
    } catch(e2) {}
  }
}

init();
</script>
