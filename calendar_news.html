<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>방송기술부 일정관리</title>
<style>
:root{
  --bg:#ebe8e2;
  --blue:#1a56db;--blue-lt:#eff3ff;--blue-dk:#1e40af;
  --gray:#f4f2ee;--paper:#faf9f6;
  --red:#e03535;--green:#18a85a;--amber:#d97706;--purple:#7c3aed;
  --sc:#0ea5e9;--pc:#7c3aed;
  --ink:#1e1e1e;--dim:#555;--muted:#999;
  --shadow:0 4px 24px rgba(0,0,0,.10);--shadow-sm:0 2px 10px rgba(0,0,0,.07);
  --r:14px;--cell-h:130px;
  --font:'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--font);min-height:100vh;line-height:1.4}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
button,input,select,textarea{font:inherit}

/* 핀패드 오버레이 */
#pinOverlay{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
}
#pinOverlay.hidden{display:none}
.pin-card{
  background:var(--paper);
  border-radius:20px;
  box-shadow:var(--shadow);
  padding:36px 40px;
  width:320px;
  display:flex;flex-direction:column;align-items:center;gap:18px;
}
.pin-title{font-size:18px;font-weight:700;color:var(--ink);letter-spacing:-.02em}
.pin-sub{font-size:12px;color:var(--muted)}
.pin-dots{display:flex;gap:10px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #ccc;transition:all .15s}
.pin-dot.filled{background:var(--blue);border-color:var(--blue)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%}
.pin-key{
  height:54px;border-radius:12px;border:none;
  background:var(--gray);color:var(--ink);
  font-size:20px;font-weight:700;cursor:pointer;
  transition:all .12s;box-shadow:var(--shadow-sm);
}
.pin-key:hover{background:#e8e5df;transform:translateY(-1px)}
.pin-key:active{transform:translateY(0);box-shadow:none}
.pin-key.del{font-size:16px;color:var(--muted)}
.pin-err{font-size:12px;color:var(--red);min-height:16px;text-align:center}

/* 버튼 */
.btn{display:inline-flex;align-items:center;gap:5px;border:0;border-radius:9px;background:var(--blue);color:#fff;padding:8px 14px;cursor:pointer;font-weight:700;font-size:13px;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--blue-dk)}
.btn:active{transform:translateY(1px)}
.btn-ghost{background:transparent;color:var(--blue);border:1.5px solid var(--blue);padding:6px 12px}
.btn-ghost:hover{background:var(--blue-lt);color:var(--blue-dk)}
.btn-sec{background:var(--gray);color:var(--dim);border:1px solid #ddd}
.btn-sec:hover{background:#e8e5df;color:var(--ink)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#c02828}
.btn-sm{padding:6px 11px;font-size:12px;border-radius:8px}
.btn-xs{padding:4px 9px;font-size:11px;border-radius:7px}

/* 레이아웃 */
.wrap{max-width:1580px;margin:0 auto;padding:16px}
.sheet{background:var(--paper);border-radius:20px;overflow:hidden;box-shadow:var(--shadow)}

/* 헤더 */
header{padding:14px 22px 12px;border-bottom:2px solid var(--blue-lt);position:relative;background:var(--paper)}
header::after{content:'';position:absolute;bottom:-2px;left:0;width:80px;height:2px;background:var(--blue)}
.hrow{display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:baseline;gap:10px;min-width:170px}
.dept-badge{font-size:10px;font-weight:700;color:var(--blue);letter-spacing:.1em;text-transform:uppercase;background:var(--blue-lt);border:1px solid rgba(26,86,219,.2);padding:3px 8px;border-radius:5px}
.app-title{font-size:clamp(20px,2.2vw,30px);font-weight:700;letter-spacing:-.03em;color:var(--ink)}
.month-nav{position:absolute;left:50%;transform:translateX(-50%);bottom:8px;display:flex;align-items:center;gap:8px;white-space:nowrap}
.month-lbl{font-size:clamp(15px,1.6vw,22px);font-weight:700;color:var(--blue);background:var(--blue-lt);border:1px solid rgba(26,86,219,.18);border-radius:999px;padding:4px 16px;min-width:130px;text-align:center}
.month-move{width:30px;height:30px;border-radius:999px;border:1.5px solid #ddd;background:var(--gray);color:var(--blue);font-size:18px;font-weight:700;line-height:1;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .12s}
.month-move:hover{border-color:var(--blue);background:var(--blue-lt);transform:translateY(-1px)}
.nav-row{display:flex;align-items:center;gap:6px}
.nav-btn{background:var(--gray);border:1px solid #ddd;color:var(--dim);padding:6px 10px;border-radius:8px;font-size:13px;cursor:pointer;transition:all .12s}
.nav-btn:hover{color:var(--ink);border-color:#aaa}
.today-btn{color:var(--amber);border-color:rgba(215,119,6,.3);background:rgba(215,119,6,.06)}

/* Supabase 상태 */
.sb-status{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);padding:4px 9px;border-radius:7px;background:var(--gray);border:1px solid #ddd}
.sb-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
.sb-dot.ok{background:var(--green)}
.sb-dot.err{background:var(--red)}
.sb-dot.loading{background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* GitHub 배포 버튼 */
.btn-deploy{background:#24292e;color:#fff;font-size:11px}
.btn-deploy:hover{background:#444}
#deployStatus{font-size:11px;color:var(--muted);display:none}

/* 모드 탭 — pill 방식 */
.cal-ctrl{display:flex;align-items:center;justify-content:flex-start;padding:10px 22px 0;gap:14px}
.mode-tabs{display:flex;gap:4px;background:var(--gray);border:1.5px solid #ddd;border-radius:12px;padding:3px}
.mode-tab{padding:6px 20px;border-radius:9px;border:none;background:transparent;color:var(--muted);font-weight:700;font-size:13px;cursor:pointer;transition:all .15s}
.mode-tab.a-shift{background:var(--sc);color:#fff;box-shadow:0 2px 8px rgba(14,165,233,.35)}
.mode-tab.a-prod{background:var(--pc);color:#fff;box-shadow:0 2px 8px rgba(124,58,237,.35)}
.mode-tab:not(.a-shift):not(.a-prod):hover{color:var(--ink);background:#e8e5df}
.mode-hint{font-size:11px;color:var(--muted)}

/* 캘린더 그리드 */
.cal-shell{padding:12px 16px 16px}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border:1.5px solid #ddd;border-radius:var(--r);overflow:hidden;background:#ddd;gap:1px}
.wdhd{padding:9px 6px;text-align:center;font-weight:700;font-size:11px;letter-spacing:.05em;text-transform:uppercase;background:var(--gray);color:var(--muted)}
.wdhd.sun{color:var(--red)}.wdhd.sat{color:var(--blue)}

.day-cell{min-height:var(--cell-h);padding:7px 6px 5px;display:flex;flex-direction:column;gap:3px;background:var(--paper);position:relative;transition:background .1s;cursor:default}
.day-cell.other{background:var(--gray)!important;pointer-events:none}
.day-cell.other>*{visibility:hidden}
.day-cell.sun{background:#fff8f8}
.day-cell.sat{background:#f8f9ff}
.day-cell.today{background:var(--blue-lt);outline:2px solid rgba(26,86,219,.35);outline-offset:-2px}
.day-cell.holiday{background:#fff5f5}
.day-cell.halfd{background:#f0fff8}
.day-cell.drop-over{background:var(--blue-lt)!important;outline:2px dashed var(--blue);outline-offset:-2px}

.add-day-btn{position:absolute;right:5px;bottom:5px;width:22px;height:22px;border-radius:50%;border:1px solid #ddd;background:var(--paper);color:var(--blue);font-size:15px;font-weight:700;line-height:1;display:none;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow-sm);z-index:2}
.day-cell:hover .add-day-btn,.day-cell:focus-within .add-day-btn{display:flex}
.add-day-btn:hover{background:var(--blue-lt);border-color:var(--blue)}
@media(pointer:coarse){.add-day-btn{display:flex;width:26px;height:26px}}

.date-top{display:flex;align-items:flex-start;justify-content:space-between;min-height:32px}
.date-num{font-weight:700;font-size:12px;color:var(--dim);line-height:1}
.day-cell.sun .date-num{color:var(--red)}.day-cell.sat .date-num{color:var(--blue)}
.day-cell.holiday .date-num{color:var(--red)}.day-cell.today .date-num{color:var(--blue)}
.date-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.bdg-today{font-size:8px;padding:1px 5px;border-radius:99px;background:var(--blue);color:#fff;font-weight:700}
.bdg-hol{font-size:10px;padding:1px 5px;border-radius:99px;font-weight:700;color:var(--red);background:rgba(224,53,53,.09)}
.bdg-halfd{font-size:10px;padding:1px 5px;border-radius:99px;font-weight:700;color:var(--green);background:rgba(24,168,90,.09)}

/* 이벤트 칩 */
.events{display:flex;flex-direction:column;gap:2px;overflow:hidden;flex:1}
.chip{display:flex;align-items:center;min-height:21px;border-radius:5px;overflow:hidden;font-size:10.5px;cursor:grab;transition:opacity .12s,transform .12s;position:relative;background:var(--gray)}
.chip:active{cursor:grabbing}
.chip.dragging{opacity:.45;transform:scale(.96)}
.chip-bar{width:3px;flex-shrink:0}
.chip-txt{padding:2px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--dim);flex:1;font-size:11px;font-weight:700}
.chip-time{font-size:10px;color:#fff;background:var(--pc);border-radius:999px;padding:2px 6px;margin-left:3px;flex-shrink:0;font-weight:700;min-width:42px;text-align:center}
.chip-time.allday{width:9px;min-width:9px;height:16px;padding:0;margin-left:3px;background:var(--pc);opacity:.5;color:transparent;border:0}
.chip.shift-chip .chip-bar{background:var(--sc)}.chip.shift-chip{background:rgba(14,165,233,.1)}
.chip.prod-chip .chip-bar{background:var(--pc)}.chip.prod-chip{background:rgba(124,58,237,.1)}
.more-chip{font-size:10px;color:var(--blue);padding:2px 5px;border:1px dashed rgba(26,86,219,.3);border-radius:6px;cursor:pointer;background:var(--blue-lt);width:max-content}

/* 편집 팝오버 */
.edit-pop{position:fixed;z-index:500;background:var(--paper);border:1.5px solid #ddd;border-radius:14px;box-shadow:var(--shadow);padding:16px;width:300px;display:none;max-height:calc(100vh - 16px);overflow-y:auto}
.edit-pop.open{display:block}
.edit-pop-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px}
.edit-pop-title{font-size:13px;font-weight:700;color:var(--ink)}
.edit-pop-close{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0;line-height:1}
.ep-row{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.ep-row:last-child{margin-bottom:0}
.ep-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.07em;text-transform:uppercase}
.ep-input,.ep-select,.ep-textarea{width:100%;border:1.5px solid #ddd;border-radius:8px;padding:7px 10px;background:var(--gray);color:var(--ink);outline:none;font-size:12px;transition:border-color .12s}
.ep-input:focus,.ep-select:focus,.ep-textarea:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(26,86,219,.1)}
.ep-textarea{resize:vertical;min-height:60px}
.ep-actions{display:flex;justify-content:space-between;gap:6px;margin-top:12px}

/* 모달 다이얼로그 */
dialog{border:0;border-radius:18px;box-shadow:var(--shadow),0 0 0 1.5px #ddd;padding:0;color:var(--ink);background:var(--paper)}
dialog::backdrop{background:rgba(30,30,30,.5);backdrop-filter:blur(4px)}
.modal{display:grid;grid-template-rows:auto 1fr auto;max-height:92vh}
.m-head{padding:16px 20px 12px;border-bottom:1.5px solid #eee;display:flex;justify-content:space-between;align-items:start;gap:12px;background:var(--paper)}
.m-title{font-size:16px;font-weight:700;letter-spacing:-.02em}
.m-sub{font-size:11px;color:var(--muted);margin-top:2px}
.m-body{padding:18px;overflow:visible}
.m-foot{padding:10px 18px 14px;border-top:1.5px solid #eee;display:flex;justify-content:flex-end;gap:8px;background:var(--paper)}

/* 폼 요소 */
.frow{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.frow:last-child{margin-bottom:0}
.flabel{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.finput,.fselect,.ftextarea{width:100%;border:1.5px solid #ddd;border-radius:9px;padding:9px 12px;background:var(--gray);color:var(--ink);outline:none;font-size:13px;transition:border-color .12s,box-shadow .12s}
.finput:focus,.fselect:focus,.ftextarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.ftextarea{resize:vertical;min-height:72px}
.fselect option{background:var(--paper);color:var(--ink)}
.frow-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}

/* 날짜 피커 */
.df-wrap{position:relative}
.df{display:flex;align-items:center;gap:8px;border:1.5px solid #ddd;border-radius:10px;padding:10px 13px;background:var(--gray);cursor:pointer;transition:border-color .15s,box-shadow .15s;min-height:42px}
.df:hover,.df:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.df-ico{font-size:14px;opacity:.65;flex-shrink:0}
.df-txt{font-size:13px;font-weight:600;color:var(--ink);flex:1}
.mini-pop{position:fixed;top:auto;left:auto;z-index:1000;background:var(--paper);border:1.5px solid #ddd;border-radius:13px;box-shadow:var(--shadow);padding:12px;width:280px;display:none;max-height:min(360px,calc(100vh - 24px));overflow:auto}
.mini-pop.open{display:block}
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.mnav-title{font-weight:700;font-size:12px;color:var(--ink)}
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.mhd{font-size:10px;font-weight:700;color:var(--muted);text-align:center;padding:3px}
.mday{font-size:12px;font-weight:700;text-align:center;padding:5px 3px;border-radius:7px;cursor:pointer;color:var(--dim);transition:background .1s}
.mday:hover{background:var(--blue-lt);color:var(--blue)}
.mday.other{color:#ccc}
.mday.sel{background:var(--blue);color:#fff}
.mday.today-d{outline:1.5px solid var(--blue);outline-offset:1px}

/* 시간 드롭다운 */
.dtf-row{display:flex;align-items:stretch;border:1.5px solid #ddd;border-radius:10px;overflow:visible;background:var(--gray);min-height:42px;transition:border-color .15s,box-shadow .15s;position:relative}
.dtf-row:hover,.dtf-row:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.dtf-date{display:flex;align-items:center;gap:7px;padding:10px 12px;cursor:pointer;flex:1;border-right:1.5px solid #ddd;transition:background .12s;min-width:0}
.dtf-date:hover{background:var(--blue-lt)}
.dtf-date .dico{font-size:13px;opacity:.6}
.dtf-date .dtxt{font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap}
.dtf-time{display:flex;align-items:center;gap:5px;padding:10px 14px;cursor:pointer;min-width:110px;justify-content:center;transition:background .12s;position:relative}
.dtf-time:hover{background:var(--blue-lt)}
.dtf-time .tico{font-size:11px;opacity:.5}
.dtf-time .tval{font-size:15px;font-weight:700;color:var(--ink);letter-spacing:.02em}
.dtf-time .tcar{font-size:10px;color:var(--muted);margin-left:2px}
.tdrop{position:absolute;top:calc(100% + 7px);right:0;z-index:450;background:var(--paper);border:1.5px solid #ddd;border-radius:14px;box-shadow:var(--shadow);padding:8px;width:188px;display:none;max-height:300px;overflow-y:auto}
.tdrop.open{display:block}
.topt{padding:8px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;color:var(--dim);transition:background .1s,color .1s;display:flex;align-items:center;justify-content:space-between}
.topt:hover{background:var(--blue-lt);color:var(--blue)}
.topt.active{background:var(--blue);color:#fff}
.topt-lbl{font-size:10px;color:inherit;opacity:.7;font-weight:700}
.ep-timebox{position:relative;display:flex;align-items:center;justify-content:space-between;gap:8px;border:1.5px solid #ddd;border-radius:10px;background:var(--gray);padding:9px 12px;cursor:pointer;transition:border-color .12s,box-shadow .12s}
.ep-timebox:hover{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.ep-timebox .tico{font-size:12px;opacity:.55}
.ep-timebox .tval{font-size:14px;font-weight:700;color:var(--ink);flex:1}
.ep-timebox .tcar{font-size:10px;color:var(--muted)}
.ep-timebox .tdrop{right:0;left:auto;width:190px;max-height:260px}

/* 반복 옵션 */
.repeat-row{display:flex;gap:8px}
.repeat-opt{flex:1;padding:8px;border:1.5px solid #ddd;border-radius:8px;background:var(--gray);color:var(--dim);cursor:pointer;font-size:12px;font-weight:700;text-align:center;transition:all .12s}
.repeat-opt:hover{border-color:var(--blue);color:var(--blue)}
.repeat-opt.selected{background:var(--blue);border-color:var(--blue);color:#fff}

/* 토글 */
.tgl-wrap{display:flex;align-items:center;gap:10px}
.tgl-pill{position:relative;width:40px;height:22px;cursor:pointer;flex-shrink:0}
.tgl-pill input{opacity:0;width:0;height:0;position:absolute}
.tgl-track{position:absolute;inset:0;border-radius:11px;background:#ccc;transition:.22s}
.tgl-pill input:checked~.tgl-track{background:var(--blue)}
.tgl-knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.22s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.tgl-pill input:checked~.tgl-knob{transform:translateX(18px)}
.tgl-label{font-size:13px;color:var(--dim)}

/* 설정 다이얼로그 */
dialog#dlgSettings{width:min(94vw,640px)}
.set-sec{background:var(--gray);border-radius:12px;padding:14px 16px;margin-bottom:12px}
.set-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.wlist{display:flex;flex-wrap:wrap;gap:6px}
.wrow{display:inline-flex;align-items:center;gap:6px;background:rgba(14,165,233,.1);border:1px solid rgba(14,165,233,.25);border-radius:999px;padding:5px 9px}
.widx{font-size:10px;color:var(--muted);flex-shrink:0}
.winp{width:90px;background:transparent;border:none;border-bottom:1.5px solid transparent;color:var(--ink);font-size:13px;font-weight:700;outline:none;padding:1px 0;transition:border-color .12s}
.winp:focus{border-bottom-color:var(--blue)}
.del-btn{background:transparent;border:none;color:var(--muted);cursor:pointer;padding:2px 5px;border-radius:5px;font-size:12px}
.del-btn:hover{background:rgba(224,53,53,.12);color:var(--red)}
.add-row-btn{width:100%;margin-top:7px;background:transparent;border:1.5px dashed #ddd;color:var(--muted);border-radius:8px;padding:7px;font-size:12px;display:flex;align-items:center;justify-content:center;gap:5px;cursor:pointer}
.add-row-btn:hover{border-color:var(--blue);color:var(--blue)}
.prog-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.prog-tag{display:inline-flex;align-items:center;gap:5px;background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.25);color:var(--purple);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:700}
.ptdel{background:transparent;border:none;color:inherit;cursor:pointer;padding:0;width:14px;height:14px;border-radius:50%;font-size:11px;opacity:.6}
.ptdel:hover{opacity:1;background:rgba(224,53,53,.15);color:var(--red)}
.prog-add-row{display:flex;gap:7px}
.prog-inp{flex:1;background:var(--paper);border:1.5px solid #ddd;border-radius:8px;padding:7px 10px;color:var(--ink);font-size:13px;outline:none}
.prog-inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.move-btn{background:transparent;border:none;color:inherit;cursor:pointer;opacity:.55;font-weight:700;padding:0 2px}
.move-btn:hover{opacity:1;color:var(--blue)}
.other-input{display:none;margin-top:8px}
.scope-box{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}

<script>
/* ─────────────────────────────────────────────
   상수 / 설정
───────────────────────────────────────────── */
const SB_URL  = 'https://gbnirljduhoajfdvgqwq.supabase.co';
const SB_KEY  = 'sb_publishable_EzP2_RNac1WE4AmB79tl3A_PkwYEBxi';
const GH_TOKEN= ['ghp','7eKjkIZdBCrrbbfovJhiaqV','mZ8r1Mn058ZjL'].join('_');
const GH_REPO = 'dytpqg-sys/MBC';
const GH_FILE = 'calendar_news.html';
const LS_KEY  = 'btech-cal-v3';
const PIN_KEY  = 'btech-cal-pin-hash';
const DEFAULT_PIN_HASH = 'b6589fc6ab0dc82cf12099d1c2d40ab994e8410c'; // SHA1("0000") — SHA256으로 업그레이드

const WEEKDAYS=['일','월','화','수','목','금','토'];
const DEFAULT_WORKERS=[{id:'w1',name:'근무자 1'},{id:'w2',name:'근무자 2'},{id:'w3',name:'근무자 3'},{id:'w4',name:'근무자 4'},{id:'w5',name:'근무자 5'},{id:'w6',name:'근무자 6'}];
const DEFAULT_PROGRAMS=['뉴스데스크','뉴스투데이','시시각각','라디오 중계','스포츠 중계'];
const FIXED_HOL=[{m:1,d:1,n:'신정'},{m:3,d:1,n:'삼일절'},{m:5,d:1,n:'노동절'},{m:5,d:5,n:'어린이날'},{m:6,d:6,n:'현충일'},{m:8,d:15,n:'광복절'},{m:10,d:3,n:'개천절'},{m:10,d:9,n:'한글날'},{m:12,d:25,n:'성탄절'}];
const LUNAR={2025:{s:'2025-01-29',c:'2025-10-06',b:'2025-05-05'},2026:{s:'2026-02-17',c:'2026-09-25',b:'2026-05-24'},2027:{s:'2027-02-07',c:'2027-09-15',b:'2027-05-13'},2028:{s:'2028-01-27',c:'2028-10-03',b:'2028-05-02'}};
const ONE_HOL={'2026-06-03':'지방선거'};
const HOL_CACHE={};

/* ─────────────────────────────────────────────
   SHA-256 해시
───────────────────────────────────────────── */
async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ─────────────────────────────────────────────
   PIN 시스템
───────────────────────────────────────────── */
let pinBuf='';

function getPinHash(){
  return localStorage.getItem(PIN_KEY)||null;
}
async function setPinHash(pin){
  const h=await sha256(pin);
  localStorage.setItem(PIN_KEY,h);
  return h;
}
async function checkPin(pin){
  const stored=getPinHash();
  const h=await sha256(pin);
  if(!stored){
    // 최초: 기본 0000 체크
    const def=await sha256('0000');
    return h===def;
  }
  return h===stored;
}

async function initPin(){
  const overlay=id('pinOverlay');
  // 세션 내 이미 인증됐으면 스킵
  if(sessionStorage.getItem('pin-ok')==='1'){overlay.classList.add('hidden');return;}
  // 핀패드 이벤트
  id('pinPad').addEventListener('click',async e=>{
    const v=e.target.dataset.v;
    if(v===undefined)return;
    if(pinBuf.length<4){pinBuf+=v;renderPinDots();}
    if(pinBuf.length===4){
      const ok=await checkPin(pinBuf);
      if(ok){
        sessionStorage.setItem('pin-ok','1');
        overlay.classList.add('hidden');
      } else {
        id('pinErr').textContent='PIN이 틀렸습니다.';
        setTimeout(()=>{pinBuf='';renderPinDots();id('pinErr').textContent='';},700);
      }
    }
  });
  id('pinDel').onclick=()=>{pinBuf=pinBuf.slice(0,-1);renderPinDots();id('pinErr').textContent='';};
}

function renderPinDots(){
  for(let i=0;i<4;i++) id('pd'+i).classList.toggle('filled',i<pinBuf.length);
}

/* ─────────────────────────────────────────────
   Supabase 클라이언트
───────────────────────────────────────────── */
const SB={
  ready:false,
  async req(method,path,body){
    const res=await fetch(`${SB_URL}/rest/v1/${path}`,{
      method,
      headers:{
        'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,
        'Content-Type':'application/json',
        'Prefer':method==='POST'?'return=representation,resolution=merge-duplicates':'return=representation',
      },
      body:body?JSON.stringify(body):undefined
    });
    if(!res.ok){const t=await res.text();throw new Error(t);}
    return method==='DELETE'?null:res.json();
  },
  async getEvents(){return this.req('GET','worklog_news?select=*&order=created_at.asc');},
  async upsertEvents(rows){return rows.length?this.req('POST','worklog_news?on_conflict=id',rows):[];},
  async updateEvent(id,patch){return this.req('PATCH',`worklog_news?id=eq.${encodeURIComponent(id)}`,patch);},
  async deleteEvent(id){return this.req('DELETE',`worklog_news?id=eq.${encodeURIComponent(id)}`);},
};

/* ─────────────────────────────────────────────
   localStorage
───────────────────────────────────────────── */
const LS={
  load(){try{const r=localStorage.getItem(LS_KEY);return r?JSON.parse(r):null;}catch(e){return null;}},
  save(data){try{localStorage.setItem(LS_KEY,JSON.stringify(data));}catch(e){}}
};

/* ─────────────────────────────────────────────
   앱 상태
───────────────────────────────────────────── */
const st={
  cur:startOfMonth(new Date()),
  mode:'shift',
  data:{workers:DEFAULT_WORKERS,programs:DEFAULT_PROGRAMS,events:[]},
  tmp:{workers:[],programs:[]},
  ms:{},
  repeat:'none',
  drag:{ev:null,fromIso:null},
  editEvId:null,
  editScope:'single',
};

/* ─────────────────────────────────────────────
   초기화
───────────────────────────────────────────── */
async function init(){
  await initPin();
  updateSbStatus('loading');
  try{
    const evs=await SB.getEvents();
    if(evs?.length) st.data.events=evs.map(normEvent).filter(Boolean);
    // 로컬에 workers/programs가 있으면 사용
    const local=LS.load();
    if(local?.workers?.length) st.data.workers=local.workers;
    if(local?.programs?.length) st.data.programs=local.programs;
    SB.ready=true;
    updateSbStatus('ok');
  }catch(e){
    SB.ready=false;
    updateSbStatus('err');
    const local=LS.load();
    if(local) st.data=normData(local);
  }
  bindAll();
  renderAll();
}

───────────────────────────────────────────── */
async function deployToGitHub(){
  const status=id('deployStatus');
  const btn=id('btnDeploy');
  btn.disabled=true;status.style.display='inline';status.textContent='배포 중…';
  try{
    // 현재 파일 SHA 조회
    const infoRes=await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`,{
      headers:{'Authorization':'token '+GH_TOKEN,'Accept':'application/vnd.github.v3+json'}
    });
    const info=await infoRes.json();
    const sha=info.sha;
    // 현재 HTML 소스
    const content=btoa(unescape(encodeURIComponent(document.documentElement.outerHTML)));
    const putRes=await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`,{
      method:'PUT',
      headers:{'Authorization':'token '+GH_TOKEN,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({message:'calendar_news: 자동 배포 '+new Date().toLocaleString('ko-KR'),content,sha})
    });
    if(!putRes.ok){const t=await putRes.text();throw new Error(t);}
    status.textContent='배포 완료 ✓';
    setTimeout(()=>{status.style.display='none';},3000);
  }catch(e){
    status.textContent='배포 실패: '+e.message;
    alert('GitHub 배포 실패: '+e.message);
  }finally{btn.disabled=false;}
}

function renderCal(){
  const y=st.cur.getFullYear(),m=st.cur.getMonth();
  id('monthLbl').textContent=`${y}년 ${m+1}월`;
  const grid=id('calGrid');
  grid.innerHTML='';
  WEEKDAYS.forEach((d,i)=>{
    const h=el('div','wdhd'+(i===0?' sun':i===6?' sat':''));
    h.textContent=d;grid.append(h);
  });
  const todayIso=isoDate(new Date());
  const firstDay=new Date(y,m,1);
  const startDay=new Date(y,m,1-firstDay.getDay());
  const halfDs=new Set(getHalfDayFridays(y,m));
  for(let i=0;i<42;i++){
    const date=addDays(startDay,i);
    const iso=isoDate(date);
    const isOther=date.getMonth()!==m;
    const dow=date.getDay();
    const holName=getHol(iso);
    const isHol=!!holName;
    const isHalfD=halfDs.has(iso);
    const cls=['day-cell',
      isOther?'other':'',
      dow===0?'sun':'',dow===6?'sat':'',
      iso===todayIso?'today':'',
      isHol&&!isOther?'holiday':'',
      isHalfD&&!isOther&&!isHol?'halfd':'',
    ].filter(Boolean).join(' ');
    const cell=el('div',cls);
    cell.dataset.iso=iso;

    const top=el('div','date-top');
    const num=el('span','date-num');num.textContent=date.getDate();top.append(num);
    const meta=el('span','date-meta');
    if(iso===todayIso){const b=el('span','bdg-today');b.textContent='TODAY';meta.append(b);}
    if(holName){const b=el('span','bdg-hol');b.textContent=holName;meta.append(b);}
    else if(isHalfD){const b=el('span','bdg-halfd');b.textContent='반일';meta.append(b);}
    top.append(meta);
    cell.append(top);

    if(!isOther){
      const addBtn=el('button','add-day-btn');
      addBtn.type='button';addBtn.title='일정 추가';addBtn.textContent='+';
      addBtn.onclick=e=>{e.stopPropagation();openAddDialog(iso);};
      cell.append(addBtn);

      const evs=getEventsForDate(iso).filter(ev=>ev.type===st.mode);
      const wrap=el('div','events');
      evs.slice(0,5).forEach(ev=>wrap.append(makeChip(ev,iso)));
      cell.append(wrap);
      if(evs.length>5){const mc=el('div','more-chip');mc.textContent=`+${evs.length-5}개`;mc.onclick=e=>{e.stopPropagation();openDayDialog(iso,evs);};cell.append(mc);}

      cell.addEventListener('dragover',e=>{e.preventDefault();cell.classList.add('drop-over');});
      cell.addEventListener('dragleave',()=>cell.classList.remove('drop-over'));
      cell.addEventListener('drop',e=>{e.preventDefault();cell.classList.remove('drop-over');handleDrop(iso);});
    }
    grid.append(cell);
  }
}

/* ─────────────────────────────────────────────
   유틸
───────────────────────────────────────────── */
function startOfMonth(d){return new Date(d.getFullYear(),d.getMonth(),1);}
function addDays(d,n){const c=new Date(d);c.setDate(c.getDate()+n);return c;}
function addMonths(d,n){return new Date(d.getFullYear(),d.getMonth()+n,1);}
function isoDate(d){return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function parseIso(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function isoShort(iso){const d=parseIso(iso);return`${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())}`;}
function fmtKorDate(iso){const d=parseIso(iso);return`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일(${WEEKDAYS[d.getDay()]})`;}
function dateRange(s,e){const res=[];let c=parseIso(s);while(isoDate(c)<=e){res.push(isoDate(c));c=addDays(c,1);}return res;}
function uid(){return crypto.randomUUID?.()??`id-${Date.now()}-${Math.random().toString(16).slice(2)}`;}
function pad(n){return String(n).padStart(2,'0');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function id(s){return document.getElementById(s);}
function el(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
function showDlg(dlgId){const d=id(dlgId);if(d.showModal)d.showModal();else d.setAttribute('open','');}

/* ─────────────────────────────────────────────
   공휴일
───────────────────────────────────────────── */
function getHol(iso){const y=+iso.slice(0,4);if(!HOL_CACHE[y])HOL_CACHE[y]=buildHol(y);return HOL_CACHE[y][iso]||'';}
function buildHol(y){
  const map={};
  const add=(iso,n)=>{if(iso&&n)map[iso]=map[iso]?map[iso]+'·'+n:n;};
  FIXED_HOL.forEach(h=>{
    const iso=`${y}-${pad(h.m)}-${pad(h.d)}`;add(iso,h.n);
    const wd=parseIso(iso).getDay();
    if(wd===0||wd===6){let c=addDays(parseIso(iso),wd===0?1:2);while(map[isoDate(c)])c=addDays(c,1);add(isoDate(c),h.n+' 대체');}
  });
  const lu=LUNAR[y];
  if(lu){
    if(lu.s){const d=parseIso(lu.s);[-1,0,1].forEach(x=>add(isoDate(addDays(d,x)),'설날'));}
    if(lu.c){const d=parseIso(lu.c);[-1,0,1].forEach(x=>add(isoDate(addDays(d,x)),'추석'));}
    if(lu.b)add(lu.b,'부처님오신날');
  }
  Object.entries(ONE_HOL).forEach(([i,n])=>{if(+i.slice(0,4)===y)add(i,n);});
  return map;
}

/* ─────────────────────────────────────────────
   반일 금요일
───────────────────────────────────────────── */
function getHalfDayFridays(y,m){
  const fridays=[];
  let d=new Date(y,m,1);
  while(d.getMonth()===m){if(d.getDay()===5)fridays.push(isoDate(d));d=addDays(d,1);}
  const res=[];
  if(fridays[1])res.push(fridays[1]);
  if(fridays[3])res.push(fridays[3]);
  if(fridays[4])res.push(fridays[4]);
  return res;
}

/* ─────────────────────────────────────────────
   이벤트 데이터
───────────────────────────────────────────── */
function getEventsForDate(iso){
  return st.data.events
    .filter(ev=>ev.dates&&ev.dates.includes(iso))
    .sort((a,b)=>{const at=a.timeStart||'',bt=b.timeStart||'';if(at&&bt)return at.localeCompare(bt);if(at)return -1;if(bt)return 1;return chipLabel(a).localeCompare(chipLabel(b),'ko');});
}
function findW(wid){return st.data.workers.find(w=>w.id===wid);}

function normData(d){
  return{
    workers:Array.isArray(d.workers)&&d.workers.length?d.workers.map((w,i)=>({id:w.id||`w${i+1}`,name:w.name||`근무자 ${i+1}`})):DEFAULT_WORKERS,
    programs:Array.isArray(d.programs)&&d.programs.length?d.programs:DEFAULT_PROGRAMS,
    events:Array.isArray(d.events)?d.events.map(normEvent).filter(Boolean):[],
  };
}

function dbEvent(ev){
  return{
    id:ev.id,type:ev.type,dates:ev.dates||[],
    worker_id:ev.workerId||null,category:ev.category||null,
    program:ev.program||null,title:ev.title||null,
    all_day:ev.allDay??true,time_start:ev.timeStart||null,
    repeat:ev.repeat||'none',series_id:ev.seriesId||null,series_index:ev.seriesIndex??null,
    memo:ev.memo||null,created_at:ev.createdAt||new Date().toISOString(),
  };
}

function normEvent(ev){
  if(!ev||!ev.id||!ev.type)return null;
  return{
    id:ev.id,type:ev.type,
    dates:ev.dates||[ev.date].filter(Boolean),
    workerId:ev.workerId||ev.worker_id||'',
    category:ev.category||'기타',
    program:ev.program||'',title:ev.title||'',
    allDay:ev.allDay??ev.all_day??true,
    timeStart:ev.timeStart||ev.time_start||'',
    repeat:ev.repeat||'none',
    seriesId:ev.seriesId||ev.series_id||'',
    seriesIndex:ev.seriesIndex??ev.series_index??null,
    memo:ev.memo||'',
    createdAt:ev.createdAt||ev.created_at||new Date().toISOString(),
  };
}

function makeChip(ev,cellIso){
  const c=el('div','chip '+(ev.type==='shift'?'shift-chip':'prod-chip'));
  c.dataset.ev=ev.id;c.draggable=true;
  const bar=el('span','chip-bar');c.append(bar);
  if(ev.type==='prod'){
    const t=el('span','chip-time'+(ev.timeStart?'':' allday'));
    t.textContent=ev.timeStart||'';c.append(t);
  }
  const txt=el('span','chip-txt');txt.textContent=chipLabel(ev);c.append(txt);
  c.title=chipTooltip(ev);
  c.addEventListener('dragstart',e=>{st.drag.ev=ev;st.drag.fromIso=cellIso;c.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
  c.addEventListener('dragend',()=>c.classList.remove('dragging'));
  c.addEventListener('click',e=>{e.stopPropagation();openEditPop(ev,c);});
  return c;
}

function chipLabel(ev){
  if(ev.type==='shift'){const w=findW(ev.workerId);return`${w?w.name:''} · ${ev.category}`;}
  const p=[ev.program||'제작'];if(ev.title)p.push(ev.title);return p.join(' · ');
}
function chipTooltip(ev){
  const l=[];
  if(ev.type==='shift'){const w=findW(ev.workerId);l.push(`근무자: ${w?w.name:''}`,`구분: ${ev.category}`);}
  else{l.push(`프로그램: ${ev.program||''}`);if(ev.title)l.push(`내용: ${ev.title}`);if(ev.timeStart)l.push(`시간: ${ev.timeStart}`);else l.push('종일 일정');}
  if(ev.memo)l.push(`메모: ${ev.memo}`);
  return l.join('\n');
}

async function handleDrop(toIso){
  const{ev,fromIso}=st.drag;
  if(!ev||fromIso===toIso){st.drag={};return;}
  const diff=(parseIso(toIso)-parseIso(fromIso))/86400000;
  const shiftDates=dates=>dates.map(d=>isoDate(addDays(parseIso(d),diff)));
  const targets=(ev.type==='prod'&&ev.seriesId&&ev.repeat==='weekly')
    ?st.data.events.filter(x=>x.seriesId===ev.seriesId&&(x.seriesIndex??0)>=(ev.seriesIndex??0)):[ev];
  const updated=targets.map(t=>({...t,dates:shiftDates(t.dates||[])}));
  st.data.events=st.data.events.map(x=>updated.find(u=>u.id===x.id)||x);
  const ok=await saveEventsToCloud(updated,'이동');
  persist();renderCal();st.drag={};
  if(!ok)alert('이동됐지만 Supabase 저장 실패. 저장 버튼으로 재시도하세요.');
}

      <div class="ep-row"><div class="ep-label">반복</div><select class="ep-select" id="ep-repeat"><option value="none" ${ev.repeat!=='weekly'?'selected':''}>안 함</option><option value="weekly" ${ev.repeat==='weekly'?'selected':''}>매주</option></select></div>
      ${ev.seriesId?`<div class="ep-row"><div class="ep-label">적용 범위</div><div class="scope-box"><button type="button" class="scope-btn selected" data-scope="single">이 일정만</button><button type="button" class="scope-btn" data-scope="future">이후 모두</button></div></div>`:''}
      <div class="ep-row"><div class="ep-label">메모</div><textarea class="ep-textarea" id="ep-memo">${esc(ev.memo||'')}</textarea></div>`;
  }
  pop.style.left='0px';pop.style.top='0px';pop.classList.add('open');
  const rect=chipEl.getBoundingClientRect(),margin=10;
  const pw=pop.offsetWidth||300,ph=Math.min(pop.offsetHeight||320,window.innerHeight-margin*2);
  let left=rect.right+margin;
  if(left+pw>window.innerWidth-margin)left=rect.left-pw-margin;
  if(left<margin)left=Math.max(margin,window.innerWidth-pw-margin);
  let top=rect.top+(rect.height/2)-(ph/2);
  if(top+ph>window.innerHeight-margin)top=window.innerHeight-ph-margin;
  if(top<margin)top=margin;
  pop.style.left=Math.round(left)+'px';pop.style.top=Math.round(top)+'px';
  const allDaySel=id('ep-allDay'),timeRow=id('ep-time-row');
  if(allDaySel&&timeRow)allDaySel.onchange=()=>{timeRow.style.display=allDaySel.value==='true'?'none':'';};
  if(ev.type==='prod')setupTimeDrop('epTimeBtn','epTimeDrop','epTimeVal');
  st.editScope='single';
  pop.querySelectorAll('.scope-btn').forEach(b=>b.onclick=()=>{st.editScope=b.dataset.scope;pop.querySelectorAll('.scope-btn').forEach(x=>x.classList.toggle('selected',x===b));});
}

function closeEditPop(){id('editPop').classList.remove('open');st.editEvId=null;}

async function saveEditPop(){
  const ev=st.data.events.find(e=>e.id===st.editEvId);
  if(!ev){closeEditPop();return;}
  const memo=id('ep-memo')?.value.trim()||'';
  const s=id('ep-start')?.value,e=id('ep-end')?.value;
  const requestedDates=(s&&e)?dateRange(s,e):ev.dates;
  const safeDates=requestedDates.length?requestedDates:ev.dates;
  let commonPatch;
  if(ev.type==='shift'){commonPatch={category:id('ep-cat').value.trim()||'기타',memo};}
  else{const allDay=id('ep-allDay').value==='true';const timeStart=allDay?'':(id('epTimeVal')?.textContent.trim()||ev.timeStart||'09:00');commonPatch={allDay,timeStart,repeat:id('ep-repeat').value,memo};}
  const targets=(ev.type==='prod'&&ev.seriesId&&st.editScope==='future')
    ?st.data.events.filter(x=>x.seriesId===ev.seriesId&&(x.seriesIndex??0)>=(ev.seriesIndex??0)):[ev];
  const dateDiff=(safeDates?.[0]&&ev.dates?.[0])?(parseIso(safeDates[0])-parseIso(ev.dates[0]))/86400000:0;
  const updated=targets.map(t=>{
    let dates=t.dates||[];
    if(t.id===ev.id)dates=safeDates;
    else if(st.editScope==='future'&&dateDiff)dates=dates.map(d=>isoDate(addDays(parseIso(d),dateDiff)));
    return{...t,...commonPatch,dates};
  });
  st.data.events=st.data.events.map(x=>updated.find(u=>u.id===x.id)||x);
  const ok=await saveEventsToCloud(updated,'수정');
  persist();renderCal();closeEditPop();
  if(!ok)alert('수정됐지만 Supabase 저장 실패.');
}

async function delFromPop(){
  if(!confirm('이 일정을 삭제할까요?'))return;
  const ev=st.data.events.find(e=>e.id===st.editEvId);
  if(!ev){closeEditPop();return;}
  const targets=(ev.type==='prod'&&ev.seriesId&&st.editScope==='future')
    ?st.data.events.filter(x=>x.seriesId===ev.seriesId&&(x.seriesIndex??0)>=(ev.seriesIndex??0)):[ev];
  st.data.events=st.data.events.filter(e=>!targets.some(t=>t.id===e.id));
  let ok=true;
  if(SB.ready){
    updateSbStatus('loading');
    for(const t of targets){try{await SB.deleteEvent(t.id);}catch(e){ok=false;}}
    updateSbStatus(ok?'ok':'err');
  }
  persist();renderCal();closeEditPop();
  if(!ok)alert('삭제됐지만 Supabase 삭제 실패.');
}

/* ─────────────────────────────────────────────
   일정 입력 다이얼로그
───────────────────────────────────────────── */
function openAddDialog(iso){if(st.mode==='shift')openShiftDialog(iso);else openProdDialog(iso);}

function openShiftDialog(iso){
  id('shiftWorker').innerHTML=st.data.workers.map(w=>`<option value="${esc(w.id)}">${esc(w.name)}</option>`).join('');
  id('shiftType').value='휴가';
  const sto=id('shiftTypeOther');if(sto){sto.value='';sto.style.display='none';}
  id('shiftMemo').value='';
  id('shiftSub').textContent=fmtKorDate(iso);
  setMV('sSTxt','sSP',iso);setMV('sETxt','sEP',iso);
  showDlg('dlgShift');
}

function openProdDialog(iso){
  id('prodProgram').innerHTML=[...st.data.programs,'기타'].map(p=>`<option>${esc(p)}</option>`).join('');
  id('prodProgramOther').value='';id('prodProgramOther').style.display='none';
  id('prodSub').textContent=fmtKorDate(iso);
  id('prodAllDay').checked=true;
  id('prodMemoAD').value='';id('prodMemoT').value='';
  onAllDayChange();
  setMV('pADSTxt','pADSP',iso);setMV('pADETxt','pADEP',iso);
  setMV('pTSDTxt','pTSP',iso);
  id('pTSTV').textContent='09:00';
  setRepeat('none');
  showDlg('dlgProd');
}

function onAllDayChange(){
  const on=id('prodAllDay').checked;
  id('prodAllDayLbl').textContent=on?'켜짐':'꺼짐';
  id('prodAllDaySection').style.display=on?'':'none';
  id('prodTimeSection').style.display=on?'none':'';
}

function setRepeat(v){
  st.repeat=v;
  id('repNone').classList.toggle('selected',v==='none');
  id('repWeekly').classList.toggle('selected',v==='weekly');
  id('repNoneAD').classList.toggle('selected',v==='none');
  id('repWeeklyAD').classList.toggle('selected',v==='weekly');
}

async function saveShift(){
  const workerId=id('shiftWorker').value;
  let category=id('shiftType').value;
  if(category==='기타'){const ov=id('shiftTypeOther').value.trim();if(ov)category=ov;}
  const startIso=getMV('sSP'),endIso=getMV('sEP');
  const memo=id('shiftMemo').value.trim();
  if(!workerId){alert('근무자를 선택하세요.');return;}
  if(!startIso||!endIso){alert('날짜를 선택하세요.');return;}
  const dates=dateRange(startIso,endIso);
  if(!dates.length){alert('시작이 종료보다 늦습니다.');return;}
  const ev={id:uid(),type:'shift',dates,workerId,category,memo,createdAt:new Date().toISOString()};
  await pushEvent(ev);
  id('dlgShift').close();renderCal();
}

async function saveProd(){
  let program=id('prodProgram').value;
  if(program==='기타')program=id('prodProgramOther').value.trim()||'기타';
  const allDay=id('prodAllDay').checked;
  const memo=allDay?id('prodMemoAD').value.trim():id('prodMemoT').value.trim();
  if(!program){alert('프로그램을 선택하세요.');return;}
  let dates=[],timeStart='';
  if(allDay){
    const s=getMV('pADSP'),e=getMV('pADEP');
    if(!s){alert('시작 날짜를 선택하세요.');return;}
    dates=st.repeat==='weekly'?Array.from({length:12},(_,i)=>isoDate(addDays(parseIso(s),i*7))):dateRange(s,e||s);
    if(!dates.length){alert('시작이 종료보다 늦습니다.');return;}
  } else {
    const s=getMV('pTSP');
    if(!s){alert('날짜를 선택하세요.');return;}
    timeStart=id('pTSTV').textContent.trim();
    dates=st.repeat==='weekly'?Array.from({length:12},(_,i)=>isoDate(addDays(parseIso(s),i*7))):[s];
  }
  if(st.repeat==='weekly'){
    const seriesId=uid();
    for(const[i,d] of dates.entries()){await pushEvent({id:uid(),type:'prod',dates:[d],program,title:'',allDay,timeStart,repeat:'weekly',seriesId,seriesIndex:i,memo,createdAt:new Date().toISOString()});}
  } else {
    await pushEvent({id:uid(),type:'prod',dates,program,title:'',allDay,timeStart,repeat:'none',memo,createdAt:new Date().toISOString()});
  }
  id('dlgProd').close();renderCal();
}

async function pushEvent(ev){
  st.data.events.push(ev);
  const ok=await saveEventsToCloud([ev],'추가');
  persist();
  if(!ok)alert('로컬 저장됐지만 Supabase 저장 실패.');
}

/* ─────────────────────────────────────────────
   날짜 피커 (mini-pop)
───────────────────────────────────────────── */
function setupMini(fieldId,popId,txtId){
  const field=id(fieldId),pop=id(popId);
  if(!field||!pop)return;
  if(!st.ms[popId])st.ms[popId]={y:new Date().getFullYear(),m:new Date().getMonth(),sel:null};
  field.addEventListener('click',e=>{
    e.stopPropagation();
    const willOpen=!pop.classList.contains('open');
    document.querySelectorAll('.mini-pop.open').forEach(p=>{if(p.id!==popId)p.classList.remove('open');});
    document.querySelectorAll('.tdrop.open').forEach(d=>d.classList.remove('open'));
    renderMini(popId,txtId);
    if(willOpen){pop.classList.add('open');placeMiniPop(field,pop);}
    else pop.classList.remove('open');
  });
}

function placeMiniPop(field,pop){
  const r=field.getBoundingClientRect(),gap=8,pw=280;
  const ph=Math.min(pop.scrollHeight||330,window.innerHeight-24);
  let left=r.left;
  if(left+pw>window.innerWidth-gap)left=window.innerWidth-pw-gap;
  if(left<gap)left=gap;
  let top=r.bottom+gap;
  if(top+ph>window.innerHeight-gap)top=r.top-ph-gap;
  if(top<gap)top=gap;
  pop.style.left=left+'px';pop.style.top=top+'px';
}

function renderMini(popId,txtId){
  const ms=st.ms[popId],pop=id(popId);
  const y=ms.y,m=ms.m;
  const first=new Date(y,m,1),start=new Date(y,m,1-first.getDay());
  pop.innerHTML='';
  const nav=el('div','mnav');
  const prev=el('button','btn btn-sec btn-xs');prev.textContent='◀';
  prev.onclick=e=>{e.stopPropagation();ms.m--;if(ms.m<0){ms.m=11;ms.y--;}renderMini(popId,txtId);};
  const nxt=el('button','btn btn-sec btn-xs');nxt.textContent='▶';
  nxt.onclick=e=>{e.stopPropagation();ms.m++;if(ms.m>11){ms.m=0;ms.y++;}renderMini(popId,txtId);};
  const ttl=el('div','mnav-title');ttl.textContent=`${y}년 ${m+1}월`;
  nav.append(prev,ttl,nxt);pop.append(nav);
  const g=el('div','mgrid');
  WEEKDAYS.forEach(d=>{const h=el('div','mhd');h.textContent=d;g.append(h);});
  const todayIso=isoDate(new Date());
  for(let i=0;i<42;i++){
    const date=addDays(start,i),iso=isoDate(date);
    const d=el('div',['mday',date.getMonth()!==m?'other':'',ms.sel===iso?'sel':'',iso===todayIso?'today-d':''].filter(Boolean).join(' '));
    d.textContent=date.getDate();
    d.onclick=e=>{e.stopPropagation();ms.sel=iso;ms.y=date.getFullYear();ms.m=date.getMonth();if(txtId)id(txtId).textContent=isoShort(iso);pop.classList.remove('open');};
    g.append(d);
  }
  pop.append(g);
}

function setMV(txtId,popId,iso){
  if(!st.ms[popId])st.ms[popId]={};
  st.ms[popId].y=+iso.slice(0,4);st.ms[popId].m=+iso.slice(5,7)-1;st.ms[popId].sel=iso;
  if(txtId)id(txtId).textContent=isoShort(iso);
}
function getMV(popId){return st.ms[popId]?.sel||null;}

/* ─────────────────────────────────────────────
   시간 드롭다운
───────────────────────────────────────────── */
function setupTimeDrop(btnId,dropId,valId){
  const btn=id(btnId),drop=id(dropId);
  if(!btn||!drop)return;
  if(!drop.dataset.ready){
    drop.innerHTML='';
    for(let min=0;min<1440;min+=10){
      const h=String(Math.floor(min/60)).padStart(2,'0'),m=String(min%60).padStart(2,'0');
      const opt=el('div','topt');opt.dataset.v=`${h}:${m}`;
      const span=el('span');span.textContent=`${h}:${m}`;opt.append(span);
      if(min%60===0){const lbl=el('span','topt-lbl');lbl.textContent=h+'시';opt.append(lbl);}
      opt.onclick=e=>{e.stopPropagation();id(valId).textContent=opt.dataset.v;drop.querySelectorAll('.topt').forEach(o=>o.classList.remove('active'));opt.classList.add('active');drop.classList.remove('open');};
      drop.append(opt);
    }
    drop.dataset.ready='1';
  }
  btn.onclick=e=>{
    e.stopPropagation();
    document.querySelectorAll('.mini-pop.open').forEach(p=>p.classList.remove('open'));
    document.querySelectorAll('.tdrop.open').forEach(d=>{if(d.id!==dropId)d.classList.remove('open');});
    drop.classList.toggle('open');
    const cur=id(valId).textContent.trim();
    drop.querySelectorAll('.topt').forEach(o=>o.classList.toggle('active',o.dataset.v===cur));
    const act=drop.querySelector(`[data-v="${cur}"]`);
    if(act)setTimeout(()=>act.scrollIntoView({block:'center'}),10);
  };
}

/* ─────────────────────────────────────────────
   설정
───────────────────────────────────────────── */
function openSettings(){
  st.tmp.workers=st.data.workers.map(w=>({...w}));
  st.tmp.programs=[...st.data.programs];
  id('pinCur').value='';id('pinNew').value='';id('pinNew2').value='';
  renderSettingsW();renderSettingsP();
  showDlg('dlgSettings');
}

function renderSettingsW(){
  const list=id('wList');list.innerHTML='';
  id('wCount').textContent=`(${st.tmp.workers.length}명)`;
  st.tmp.workers.forEach((w,i)=>{
    const row=el('div','wrow');
    const left=el('button','move-btn');left.textContent='‹';left.title='앞으로';left.onclick=()=>{if(i>0){[st.tmp.workers[i-1],st.tmp.workers[i]]=[st.tmp.workers[i],st.tmp.workers[i-1]];renderSettingsW();}};
    const idx=el('span','widx');idx.textContent=i+1;
    const inp=el('input','winp');inp.type='text';inp.value=w.name;inp.placeholder='이름';
    inp.oninput=e=>st.tmp.workers[i].name=e.target.value;
    const right=el('button','move-btn');right.textContent='›';right.title='뒤로';right.onclick=()=>{if(i<st.tmp.workers.length-1){[st.tmp.workers[i+1],st.tmp.workers[i]]=[st.tmp.workers[i],st.tmp.workers[i+1]];renderSettingsW();}};
    const del=el('button','del-btn');del.textContent='✕';del.onclick=()=>{st.tmp.workers.splice(i,1);renderSettingsW();};
    row.append(left,idx,inp,right,del);list.append(row);
  });
}

function renderSettingsP(){
  const tags=id('progTags');tags.innerHTML='';
  st.tmp.programs.forEach((p,i)=>{
    const t=el('span','prog-tag');
    const left=el('button','move-btn');left.textContent='‹';left.onclick=()=>{if(i>0){[st.tmp.programs[i-1],st.tmp.programs[i]]=[st.tmp.programs[i],st.tmp.programs[i-1]];renderSettingsP();}};
    const name=el('span');name.textContent=p;
    const right=el('button','move-btn');right.textContent='›';right.onclick=()=>{if(i<st.tmp.programs.length-1){[st.tmp.programs[i+1],st.tmp.programs[i]]=[st.tmp.programs[i],st.tmp.programs[i+1]];renderSettingsP();}};
    const d=el('button','ptdel');d.textContent='✕';d.onclick=()=>{st.tmp.programs.splice(i,1);renderSettingsP();};
    t.append(left,name,right,d);tags.append(t);
  });
}

function addWorker(){
  const v=id('workerInp').value.trim();if(!v)return;
  st.tmp.workers.push({id:'w'+Date.now(),name:v});
  id('workerInp').value='';renderSettingsW();id('workerInp').focus();
}

function addProg(){
  const v=id('progInp').value.trim();if(!v)return;
  if(!st.tmp.programs.includes(v)){st.tmp.programs.push(v);renderSettingsP();}
  id('progInp').value='';id('progInp').focus();
}

async function saveSettings(){
  id('wList').querySelectorAll('.winp').forEach((inp,i)=>{if(st.tmp.workers[i])st.tmp.workers[i].name=inp.value.trim()||`근무자 ${i+1}`;});
  st.data.workers=st.tmp.workers.length?st.tmp.workers:DEFAULT_WORKERS;
  st.data.programs=st.tmp.programs.length?st.tmp.programs:DEFAULT_PROGRAMS;
  persist();id('dlgSettings').close();renderAll();
}
